  </div>

  <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
  <script>
    const STORAGE_KEY = 'bracketgpt_state_v2';
    let regions = ['South', 'East', 'West', 'Midwest'];
    const roundOrder = ['R64', 'R32', 'S16', 'E8', 'F4', 'NCG'];
    const roundPoints = { R64: 10, R32: 20, S16: 40, E8: 80, F4: 160, NCG: 320 };
    const r64SlotByPair = { '1v16': 0, '8v9': 1, '5v12': 2, '4v13': 3, '6v11': 4, '3v14': 5, '7v10': 6, '2v15': 7 };
    const defaultFinalFourPairings = [['South', 'East'], ['West', 'Midwest']];
    const strategyKeys = ['chalk', 'balanced', 'upset'];
    const seedColors = {
      1: 'var(--accent)', 2: 'var(--accent)', 3: 'var(--accent)', 4: 'var(--accent)',
      5: 'var(--accent-dim)', 6: 'var(--accent-dim)', 7: 'var(--accent-dim)', 8: 'var(--accent-dim)',
      9: 'var(--text-label)', 10: 'var(--text-label)', 11: 'var(--text-label)', 12: 'var(--text-label)',
      13: 'var(--text-muted)', 14: 'var(--text-muted)', 15: 'var(--text-muted)', 16: 'var(--text-muted)'
    };
    const DISPLAY_NAMES = {
      'Mississippi': 'Ole Miss',
      'Connecticut': 'UConn',
      'St Mary\'s CA': 'St. Mary\'s',
      'Saint Mary\'s': 'St. Mary\'s',
      'Mt St Mary\'s': 'Mt. St. Mary\'s',
      'Mount St. Mary\'s': 'Mt. St. Mary\'s',
      'SIUE': 'SIUE',
      'SIU Edwardsville': 'SIUE',
      'UNC Wilmington': 'UNCW',
      'Colorado St': 'Colorado St.',
      'Mississippi St': 'Miss. State',
    };

    let baseMatchups = [];
    let bracketData = null;
    let matchupById = new Map();
    let nodesById = new Map();
    let parentMap = new Map();
    let regionRoundIds = {};
    let finalIds = { F4: [], NCG: [] };
    let matchupCache = new Map();
    const bracketTeamIdByName = new Map();
    const teamIndex = new Map();
    let finalFourPairings = defaultFinalFourPairings.slice();
    let mobileRound = 'R64';
    let bracketOutput = null;
    let strategyMap = {};
    let teamEpRankings = {};
    let championProbs = {};
    let activeStrategy = '';
    let strategyBaselinePicks = {};
    let strategyEpByNode = {};
    let customOverrideNodes = new Set();
    const flowRoundOrder = ['R64', 'R32', 'S16', 'E8', 'F4', 'NCG'];
    const roundDataMap = { R64: '64', R32: '32', S16: '16', E8: '8', F4: '4', NCG: '2' };
    let autoAdvanceEnabled = true;
    let flowLocked = false;
    let guidedNodeId = '';
    let analysisToken = 0;
    let regionPreviewTimer = null;
    let regionPreviewFadeTimer = null;

    const bracketState = {
      picks: {},
      completion: { R64: 0, R32: 0, S16: 0, E8: 0, F4: 0, NCG: 0, total: 0 },
      activeStrategy: ''
    };

    function normalizeName(v) {
      return String(v || '').toLowerCase().replace(/[^a-z0-9 ]/g, '').replace(/\s+/g, ' ').trim();
    }
    function normalizeRegionName(v) {
      return String(v || '').toLowerCase().replace(/[^a-z]/g, '');
    }
    function getDisplayName(v) {
      const name = String(v || '').trim();
      return DISPLAY_NAMES[name] || name;
    }
    function normalizeProbability(v, fallback = 0) {
      const n = Number(v);
      if (!Number.isFinite(n)) return fallback;
      if (n <= 1) return Math.max(0, Math.min(1, n));
      if (n <= 100) return Math.max(0, Math.min(1, n / 100));
      return fallback;
    }

    function refreshIcons() {
      if (window.lucide && typeof window.lucide.createIcons === 'function') {
        window.lucide.createIcons();
      }
    }

    function escAttr(v) {
      return String(v == null ? '' : v).replace(/&/g, '&amp;').replace(/"/g, '&quot;');
    }

    function escHtml(v) {
      return String(v == null ? '' : v)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function md(text) {
      const safe = escHtml(text || '');
      const withInline = safe
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/`([^`]+)`/g, '<code>$1</code>');
      return withInline
        .replace(/(?:^|\n)- (.*?)(?=\n|$)/g, '<br>&bull; $1')
        .replace(/\n/g, '<br>');
    }

    function roundBannerLabel(roundKey, region) {
      return getRoundTitle(roundKey).split(' (')[0] + ' · ' + String(region || '').toUpperCase() + ' REGION';
    }

    function roundDataValue(roundKey) {
      return roundDataMap[roundKey] || '';
    }

    function flowRegionsForRound(roundKey) {
      if (roundKey === 'F4' || roundKey === 'NCG') return ['Final Four'];
      return regions.slice();
    }

    function nodeIdsForRegionRound(region, roundKey) {
      if (roundKey === 'F4') return finalIds.F4.slice();
      if (roundKey === 'NCG') return finalIds.NCG.slice();
      return (regionRoundIds[region]?.[roundKey] || []).slice();
    }

    function isNodePickable(node) {
      const [t1, t2] = getMatchTeams(node);
      return !!(t1 && t2);
    }

    function buildFlowTargets() {
      const targets = [];
      for (const roundKey of flowRoundOrder) {
        for (const region of flowRegionsForRound(roundKey)) {
          for (const id of nodeIdsForRegionRound(region, roundKey)) {
            const node = nodesById.get(id);
            if (!node) continue;
            targets.push({ id, round: roundKey, region });
          }
        }
      }
      return targets;
    }

    function findNextFlowTarget(afterNodeId) {
      const targets = buildFlowTargets();
      let start = 0;
      if (afterNodeId) {
        const idx = targets.findIndex((t) => t.id === afterNodeId);
        start = idx >= 0 ? idx + 1 : 0;
      }
      for (let i = start; i < targets.length; i++) {
        const t = targets[i];
        const node = nodesById.get(t.id);
        if (!node || !isNodePickable(node) || validPickForNode(node)) continue;
        return t;
      }
      if (start > 0) {
        for (let i = 0; i < start; i++) {
          const t = targets[i];
          const node = nodesById.get(t.id);
          if (!node || !isNodePickable(node) || validPickForNode(node)) continue;
          return t;
        }
      }
      return null;
    }

    function clearPreviewTimers() {
      if (regionPreviewTimer) clearTimeout(regionPreviewTimer);
      if (regionPreviewFadeTimer) clearTimeout(regionPreviewFadeTimer);
      regionPreviewTimer = null;
      regionPreviewFadeTimer = null;
    }

    function setInteractionLock(locked) {
      flowLocked = !!locked;
      document.body.classList.toggle('flow-locked', !!locked);
    }

    function showRegionBanner(region) {
      const banner = document.getElementById('flowBanner');
      if (!banner) return;
      banner.textContent = String(region || '').toUpperCase() + ' COMPLETE';
      banner.classList.add('show');
      clearPreviewTimers();
      regionPreviewFadeTimer = setTimeout(() => {
        banner.classList.remove('show');
      }, 4500);
    }

    function previewRegionCompletion(region, nextTarget) {
      const container = document.querySelector('.container');
      if (!container) {
        if (nextTarget) openCard(nextTarget.id, { manualResume: false, autoResume: true });
        return;
      }
      const pad = 24;
      const rect = container.getBoundingClientRect();
      const sx = Math.min(1, (window.innerWidth - pad * 2) / Math.max(1, rect.width));
      const sy = Math.min(1, (window.innerHeight - pad * 2) / Math.max(1, rect.height));
      const scale = Math.max(0.58, Math.min(sx, sy, 1));
      setInteractionLock(true);
      showRegionBanner(region);
      container.style.transform = 'scale(' + scale.toFixed(3) + ')';
      regionPreviewTimer = setTimeout(() => {
        container.style.transform = 'scale(1)';
        setTimeout(() => {
          setInteractionLock(false);
          if (nextTarget && autoAdvanceEnabled) {
            openCard(nextTarget.id, { manualResume: false, autoResume: true });
          }
        }, 400);
      }, 5000);
    }

    function showLoading() {
      const el = document.getElementById('loading');
      el.style.display = 'block';
      el.innerHTML = '<div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>';
    }

    function hideLoading() { document.getElementById('loading').style.display = 'none'; }

    function showError(msg) {
      document.getElementById('error').innerHTML = '<div class="error">' + msg + ' <button class="btn btn-secondary" onclick="init()">Retry</button></div>';
    }

    function clearError() { document.getElementById('error').innerHTML = ''; }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(bracketState));
      localStorage.setItem('bracketgpt_bracket_state', JSON.stringify(bracketState));
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (parsed && parsed.picks && typeof parsed.picks === 'object') bracketState.picks = parsed.picks;
        if (parsed && typeof parsed.activeStrategy === 'string') bracketState.activeStrategy = parsed.activeStrategy;
      } catch (e) {}
    }

    function normalizePairing(v) {
      return String(v || '').toLowerCase().replace(/\s+/g, ' ').trim();
    }

    function getRoundTitle(roundKey) {
      const names = { R64: 'Round of 64', R32: 'Round of 32', S16: 'Sweet 16', E8: 'Elite 8', F4: 'Final Four', NCG: 'Championship' };
      return (names[roundKey] || roundKey) + ' (' + (roundPoints[roundKey] || 0) + ' pts)';
    }

    function safeNum(v, fallback) {
      const n = Number(v);
      return Number.isFinite(n) ? n : (fallback || 0);
    }
    function calculateEP(winProbability, round) {
      const prob = normalizeProbability(winProbability, 0);
      const points = roundPoints[round] || roundPoints.R64 || 10;
      return Number((prob * points).toFixed(1));
    }

    function roundEpClass(round, ep) {
      const max = roundPoints[round] || 10;
      if (ep >= max * 0.8) return 'ep-good';
      if (ep >= max * 0.4) return 'ep-mid';
      return 'ep-low';
    }

    function getConfidenceBadge(conf) {
      const c = String(conf || '').toLowerCase();
      const map = {
        lock: { label: 'LOCK', color: '#d4af37' },
        confident: { label: 'CONFIDENT', color: '#5cb85c' },
        lean: { label: 'LEAN', color: '#f0ad4e' },
        slight: { label: 'SLIGHT EDGE', color: '#b0b0b0' },
        slight_edge: { label: 'SLIGHT EDGE', color: '#b0b0b0' },
        'slight edge': { label: 'SLIGHT EDGE', color: '#b0b0b0' },
        'toss-up': { label: 'TOSS-UP', color: '#d9534f' },
        toss_up: { label: 'TOSS-UP', color: '#d9534f' },
        underdog: { label: 'UNDERDOG', color: '#d9534f' },
      };
      if (map[c]) return map[c];
      if (c === 'strong') return map.confident;
      if (c === 'moderate') return map.lean;
      return { label: 'PROJECTED', color: 'var(--text-label)' };
    }

    function upsetBadge(flag) {
      const key = String(flag || '').toLowerCase();
      const map = {
        chalk: { label: 'CHALK', color: 'var(--text-label)' },
        mostly_chalk: { label: 'MOSTLY CHALK', color: 'var(--text-muted)' },
        closer_than_expected: { label: 'CLOSER THAN EXPECTED', color: 'var(--accent-dim)' },
        vulnerable_favorite: { label: 'VULNERABLE FAVORITE', color: 'var(--accent-hot)' },
        slight_upset_pick: { label: 'SLIGHT UPSET PICK', color: 'var(--accent-hot)' },
        strong_upset_pick: { label: 'STRONG UPSET PICK', color: 'var(--accent-hot)' },
        toss_up: { label: 'TOSS-UP', color: 'var(--accent-dim)' },
      };
      return map[key] || map.chalk;
    }

    function riskBadge(tier) {
      const key = String(tier || '').toLowerCase();
      const map = {
        very_low: { label: 'Very Low Risk', color: 'var(--accent)' },
        low: { label: 'Low Risk', color: 'var(--accent)' },
        medium: { label: 'Medium Risk', color: 'var(--accent-dim)' },
        elevated: { label: 'Elevated Risk', color: 'var(--accent-hot)' },
        high: { label: 'High Risk', color: 'var(--accent-hot)' },
      };
      return map[key] || { label: 'Risk N/A', color: 'var(--text-label)' };
    }

    function estimateEpFromTeam(round, teamName) {
      const total = safeNum(teamEpRankings[teamName], 0);
      const maxRound = roundPoints.NCG || 320;
      return Math.min(roundPoints[round] || 0, total * ((roundPoints[round] || 0) / maxRound));
    }

    function getPickWinProbability(node, pickName) {
      const [t1, t2] = getMatchTeams(node);
      if (!t1 || !t2) return null;
      const pickKey = normalizeName(pickName);
      const t1Key = normalizeName(t1.name);
      const t2Key = normalizeName(t2.name);
      if (!pickKey || (pickKey !== t1Key && pickKey !== t2Key)) return null;
      if (node.round === 'R64' && node.source) {
        const p1 = normalizeProbability(node.source.t1?.win_probability, null);
        const p2 = normalizeProbability(node.source.t2?.win_probability, null);
        const resolvedP1 = Number.isFinite(p1) ? p1 : (Number.isFinite(p2) ? (1 - p2) : 0.5);
        return pickKey === t1Key ? resolvedP1 : (1 - resolvedP1);
      }
      const p1 = estimateWinProb(t1.name, t2.name);
      if (!Number.isFinite(p1)) return null;
      return pickKey === t1Key ? p1 : (1 - p1);
    }

    function getNodeEp(node, pickName) {
      const baseline = strategyEpByNode[node.id];
      if (baseline && strategyBaselinePicks[node.id] === pickName) return safeNum(baseline, 0);
      const winProb = getPickWinProbability(node, pickName);
      if (Number.isFinite(winProb)) return calculateEP(winProb, node.round);
      return estimateEpFromTeam(node.round, pickName);
    }

    function makeNode(id, round, region, source, children, slot) {
      return {
        id,
        round,
        region,
        slot: Number.isFinite(Number(slot)) ? Number(slot) : null,
        source: source || null,
        children: children || [],
        parent: null
      };
    }

    function matchupKey(nameA, nameB) {
      return normalizeName(nameA) + '|' + normalizeName(nameB);
    }

    function setCachedMatchup(nameA, nameB, data) {
      const key = matchupKey(nameA, nameB);
      const rev = matchupKey(nameB, nameA);
      matchupCache.set(key, data);
      matchupCache.set(rev, data);
    }

    function getCachedMatchup(nameA, nameB) {
      return matchupCache.get(matchupKey(nameA, nameB)) || null;
    }

    function indexBracketTeamDirectory() {
      bracketTeamIdByName.clear();
      const dir = bracketData?.team_directory || {};
      for (const [id, team] of Object.entries(dir)) {
        const key = normalizeName(team?.name);
        if (key && !bracketTeamIdByName.has(key)) {
          bracketTeamIdByName.set(key, String(id));
        }
      }
    }

    async function loadBracketData() {
      try {
        const res = await fetch('/api/bracket-cache');
        if (!res.ok) return null;
        bracketData = await res.json();
        indexBracketTeamDirectory();
        return bracketData;
      } catch (e) {
        return null;
      }
    }

    function normalizeRoundToken(v) {
      return String(v || '').toLowerCase().replace(/[^a-z0-9]/g, '');
    }

    function isR64Round(v) {
      const key = normalizeRoundToken(v);
      return key === 'r64' || key === 'round64' || key === 'roundof64' || key === 'firstround' || key === '1stround';
    }

    function toProb(v, fallback) {
      const n = Number(v);
      if (!Number.isFinite(n)) return fallback;
      if (n <= 0) return 0;
      if (n <= 1) return n;
      if (n <= 100) return n / 100;
      return fallback;
    }

    function normalizeIncomingMatchup(raw, idx, seasonFallback) {
      const m = raw || {};
      const region = String(m?.region || 'Unknown').trim() || 'Unknown';
      const gameNo = Number(m?.game_number || ((idx % 8) + 1));
      const t1Raw = m?.t1 || {};
      const t2Raw = m?.t2 || {};
      const hasNested = Object.keys(t1Raw).length > 0 || Object.keys(t2Raw).length > 0;
      const t1 = hasNested ? t1Raw : {
        team_id: m?.team1Id ?? m?.team1_id ?? null,
        name: m?.team1 || m?.team1Name || m?.t1_name || 'TBD',
        seed: m?.seed1 ?? m?.team1Seed ?? m?.t1_seed ?? null,
        win_probability: m?.winProb ?? m?.model_win_prob ?? null,
        predicted_margin: m?.predicted_margin ?? null,
        abbreviation: m?.team1Abbreviation ?? null,
        color_primary: m?.team1Color ?? null
      };
      const t2 = hasNested ? t2Raw : {
        team_id: m?.team2Id ?? m?.team2_id ?? null,
        name: m?.team2 || m?.team2Name || m?.t2_name || 'TBD',
        seed: m?.seed2 ?? m?.team2Seed ?? m?.t2_seed ?? null,
        win_probability: null,
        predicted_margin: m?.predicted_margin == null ? null : -Number(m.predicted_margin),
        abbreviation: m?.team2Abbreviation ?? null,
        color_primary: m?.team2Color ?? null
      };
      const p1 = toProb(t1?.win_probability ?? t1?.model_win_prob, 0.5);
      const pair = canonicalSeedPair(t1?.seed, t2?.seed);
      const explicitSlot = Number(m?.slot);
      const inferredSlot = Number.isFinite(explicitSlot)
        ? explicitSlot
        : (Number.isFinite(Number(r64SlotByPair[pair])) ? Number(r64SlotByPair[pair]) : (gameNo - 1));
      return {
        matchup_id: String(m?.matchup_id || ('FALLBACK_R64_' + region.replace(/[^A-Za-z0-9]/g, '').toUpperCase() + '_' + gameNo)),
        season: Number(m?.season || seasonFallback || 2025),
        round: 'R64',
        region,
        slot: Number.isFinite(inferredSlot) ? inferredSlot : (idx % 8),
        game_number: gameNo,
        t1: {
          team_id: t1?.team_id ?? t1?.id ?? null,
          name: String(t1?.name || 'TBD'),
          seed: Number.isFinite(Number(t1?.seed)) ? Number(t1.seed) : null,
          win_probability: p1,
          predicted_margin: Number.isFinite(Number(t1?.predicted_margin)) ? Number(t1.predicted_margin) : null,
          abbreviation: t1?.abbreviation || null,
          color_primary: t1?.color_primary || null
        },
        t2: {
          team_id: t2?.team_id ?? t2?.id ?? null,
          name: String(t2?.name || 'TBD'),
          seed: Number.isFinite(Number(t2?.seed)) ? Number(t2.seed) : null,
          win_probability: 1 - p1,
          predicted_margin: Number.isFinite(Number(t2?.predicted_margin)) ? Number(t2.predicted_margin) : null,
          abbreviation: t2?.abbreviation || null,
          color_primary: t2?.color_primary || null
        },
        matchup_meta: {
          predicted_winner: String(m?.matchup_meta?.predicted_winner || m?.predictedWinner || ''),
          upset_flag: String(m?.matchup_meta?.upset_flag || m?.matchup_meta?.display_flag || m?.upset_flag || 'chalk'),
          display_flag: String(m?.matchup_meta?.display_flag || m?.matchup_meta?.upset_flag || m?.upset_flag || 'chalk'),
          confidence: String(m?.matchup_meta?.confidence || m?.confidence || 'projected')
        }
      };
    }

    function fallbackPairings(regionsList) {
      const names = Array.isArray(regionsList) ? regionsList : [];
      const has = (r) => names.includes(r);
      if (has('South') && has('East') && has('West') && has('Midwest')) {
        return defaultFinalFourPairings.slice();
      }
      if (names.length >= 4) return [[names[0], names[1]], [names[2], names[3]]];
      return defaultFinalFourPairings.slice();
    }

    function normalizeR64Matchups(rawMatchups) {
      const rows = Array.isArray(rawMatchups) ? rawMatchups : [];
      let matchups = rows.filter((m) => isR64Round(m?.round));
      if (!matchups.length && rows.length) {
        matchups = rows
          .slice()
          .sort((a, b) => Number(a?.game_number || 0) - Number(b?.game_number || 0))
          .slice(0, 32);
      }
      return matchups.map((m, idx) => normalizeIncomingMatchup(m, idx, m?.season || 2025));
    }

    function normalizeBracketPayload(raw) {
      const data = raw || {};
      const sourceRows = Array.isArray(data?.matchups)
        ? data.matchups
        : (Array.isArray(data?.r64_matchups) ? data.r64_matchups : []);
      const matchups = normalizeR64Matchups(sourceRows);
      const regionsFromRows = Array.from(new Set(matchups.map((m) => String(m?.region || '').trim()).filter(Boolean)));
      const pairingsArray = Array.isArray(data?.finalFourPairings) && data.finalFourPairings.length >= 2
        ? data.finalFourPairings
        : (data?.final_four_pairings
          ? [
              [data.final_four_pairings?.semifinal_1?.region_a, data.final_four_pairings?.semifinal_1?.region_b],
              [data.final_four_pairings?.semifinal_2?.region_a, data.final_four_pairings?.semifinal_2?.region_b]
            ]
          : fallbackPairings(regionsFromRows));
      return {
        ...data,
        season: Number(data?.season || matchups?.[0]?.season || 2025),
        regions: regionsFromRows.length ? regionsFromRows : (Array.isArray(data?.regions) ? data.regions : []),
        matchups,
        finalFourPairings: pairingsArray,
        final_four_pairings: data?.final_four_pairings || {
          semifinal_1: { region_a: pairingsArray?.[0]?.[0] || 'South', region_b: pairingsArray?.[0]?.[1] || 'West' },
          semifinal_2: { region_a: pairingsArray?.[1]?.[0] || 'East', region_b: pairingsArray?.[1]?.[1] || 'Midwest' }
        }
      };
    }

    async function loadBracketFromUploadedJson() {
      try {
        const candidates = [
          '/data/bracketgpt_matchups_2025_final.json',
          '/data/bracketgpt_matchups_2025_v2.json',
          '/data/bracket_2025.json',
          '/data/bracket_2025__1_.json',
          '/data/bracket_2025%20(1).json',
          '/data/bracket_predictions_2025.json',
          '/data/bracket_predictions.json'
        ];

        for (const filePath of candidates) {
          const res = await fetch(filePath);
          if (!res.ok) continue;
          const raw = await res.json();

          if (Array.isArray(raw?.matchups)) {
            const matchups = normalizeR64Matchups(raw.matchups);
            if (!matchups.length) continue;
            const regionsList = Array.from(new Set(matchups.map((m) => String(m.region || '').trim()).filter(Boolean)));
            return {
              season: Number(raw?.season || 2025),
              regions: regionsList,
              matchups,
              finalFourPairings: Array.isArray(raw?.finalFourPairings) && raw.finalFourPairings.length >= 2
                ? raw.finalFourPairings
                : fallbackPairings(regionsList)
            };
          }

          const games = Array.isArray(raw?.bracketGames) ? raw.bracketGames : (Array.isArray(raw?.games) ? raw.games : []);
          if (!games.length) continue;
          const r64 = games.filter((g) => isR64Round(g?.round));
          if (!r64.length) continue;

          const regionCounts = new Map();
          const matchups = [];
          for (const g of r64) {
            const region = String(g?.region || 'Unknown').trim() || 'Unknown';
            const gameNo = (regionCounts.get(region) || 0) + 1;
            regionCounts.set(region, gameNo);

            const t1Name = String(g?.team1 || g?.team1Name || 'TBD');
            const t2Name = String(g?.team2 || g?.team2Name || 'TBD');
            let p1 = toProb(g?.winProb, 0.5);
            if (!Number.isFinite(p1)) p1 = 0.5;
            const p2 = 1 - p1;

            const t1Seed = Number(g?.seed1 ?? g?.team1Seed);
            const t2Seed = Number(g?.seed2 ?? g?.team2Seed);
            const winner = String(g?.predictedWinner || (p1 >= p2 ? t1Name : t2Name));
            const winnerNorm = normalizeName(winner);
            const t1Win = winnerNorm === normalizeName(t1Name);
            const t2Win = winnerNorm === normalizeName(t2Name);
            let upsetFlag = 'chalk';
            if (t1Win && Number.isFinite(t1Seed) && Number.isFinite(t2Seed) && t1Seed > t2Seed) upsetFlag = 'slight_upset_pick';
            if (t2Win && Number.isFinite(t1Seed) && Number.isFinite(t2Seed) && t2Seed > t1Seed) upsetFlag = 'slight_upset_pick';

            matchups.push({
              matchup_id: 'FALLBACK_R64_' + region.replace(/[^A-Za-z0-9]/g, '').toUpperCase() + '_' + gameNo,
              season: Number(raw?.season || 2025),
              round: 'R64',
              region,
              game_number: gameNo,
              t1: {
                team_id: g?.team1Id ?? g?.team1_id ?? null,
                name: t1Name,
                seed: Number.isFinite(t1Seed) ? t1Seed : null,
                win_probability: p1,
                predicted_margin: null
              },
              t2: {
                team_id: g?.team2Id ?? g?.team2_id ?? null,
                name: t2Name,
                seed: Number.isFinite(t2Seed) ? t2Seed : null,
                win_probability: p2,
                predicted_margin: null
              },
              matchup_meta: {
                predicted_winner: winner,
                upset_flag: upsetFlag,
                display_flag: upsetFlag,
                confidence: String(g?.confidence || '').toLowerCase() || 'projected'
              }
            });
          }

          const regionsList = Array.from(new Set(matchups.map((m) => String(m.region || '').trim()).filter(Boolean)));
          return {
            season: Number(raw?.season || 2025),
            regions: regionsList,
            matchups,
            finalFourPairings: fallbackPairings(regionsList)
          };
        }
        return null;
      } catch (e) {
        return null;
      }
    }

    function getTeam(teamId) {
      return bracketData?.team_directory?.[String(teamId)] || null;
    }

    async function getMatchup(t1Id, t2Id) {
      const t1 = String(t1Id);
      const t2 = String(t2Id);
      const lookup = bracketData?.bracket_lookup || {};
      const idx = lookup[t1]?.[t2] ?? lookup[t2]?.[t1];
      if (idx !== undefined && Array.isArray(bracketData?.predictions)) {
        return bracketData.predictions[idx];
      }
      const res = await fetch('/api/matchup?t1=' + encodeURIComponent(t1) + '&t2=' + encodeURIComponent(t2));
      return res.ok ? await res.json() : null;
    }

    function toLegacyMatchupShape(prediction, teamAName, teamBName) {
      if (!prediction) return null;
      const pT1 = Number(prediction.model_win_prob);
      const modelProb = Number.isFinite(pT1) ? pT1 : 0.5;
      const predT1 = String(prediction.t1_name || '');
      const predT2 = String(prediction.t2_name || '');
      const wantsA = normalizeName(teamAName);
      const aligned = normalizeName(predT1) === wantsA || (wantsA && normalizeName(predT2) !== wantsA);
      const aSeed = aligned ? prediction.t1_seed : prediction.t2_seed;
      const bSeed = aligned ? prediction.t2_seed : prediction.t1_seed;
      const aProb = aligned ? modelProb : (1 - modelProb);
      const bProb = 1 - aProb;
      return {
        t1: { name: teamAName, seed: aSeed, win_probability: aProb },
        t2: { name: teamBName, seed: bSeed, win_probability: bProb },
        matchup_meta: {
          predicted_winner: prediction.predicted_winner_name || '',
          upset_flag: prediction.upset_flag || 'chalk',
          display_flag: prediction.upset_flag || 'chalk',
          confidence: prediction.confidence || null
        }
      };
    }

    async function getMatchupForTeams(teamAName, teamBName) {
      const cached = getCachedMatchup(teamAName, teamBName);
      if (cached) return cached;
      const idA = bracketTeamIdByName.get(normalizeName(teamAName));
      const idB = bracketTeamIdByName.get(normalizeName(teamBName));
      if (idA && idB) {
        const pred = await getMatchup(idA, idB);
        const shaped = toLegacyMatchupShape(pred, teamAName, teamBName);
        if (shaped) {
          setCachedMatchup(teamAName, teamBName, shaped);
          return shaped;
        }
      }
      try {
        const r = await fetch('/api/matchup/by-teams/' + encodeURIComponent(teamAName) + '/' + encodeURIComponent(teamBName));
        if (!r.ok) return null;
        const data = await r.json();
        setCachedMatchup(teamAName, teamBName, data);
        return data;
      } catch (e) {
        return null;
      }
    }

    function buildTeamIndex() {
      const seedBaseline = {
        1: 28, 2: 23, 3: 20, 4: 17, 5: 15, 6: 13, 7: 11, 8: 9,
        9: 7, 10: 5, 11: 4, 12: 2, 13: -1, 14: -4, 15: -8, 16: -14
      };
      teamIndex.clear();
      for (const m of baseMatchups) {
        const t1 = m?.t1;
        const t2 = m?.t2;
        if (!t1?.name || !t2?.name) continue;
        teamIndex.set(normalizeName(t1.name), {
          ...t1,
          region: m.region,
          r64Opponent: t2.name,
          r64Margin: Number.isFinite(Number(t1.predicted_margin)) ? Number(t1.predicted_margin) : 0
        });
        teamIndex.set(normalizeName(t2.name), {
          ...t2,
          region: m.region,
          r64Opponent: t1.name,
          r64Margin: Number.isFinite(Number(t2.predicted_margin)) ? Number(t2.predicted_margin) : 0
        });
      }
      for (const team of teamIndex.values()) {
        const opp = teamIndex.get(normalizeName(team.r64Opponent));
        const oppSeed = Number(opp?.seed) || 16;
        const oppBase = Number(seedBaseline[oppSeed] ?? -14);
        const ownSeed = Number(team.seed) || 16;
        const ownBase = Number(seedBaseline[ownSeed] ?? 0);
        const marginPower = oppBase + Number(team.r64Margin || 0);
        team.power = Number.isFinite(marginPower) ? marginPower : ownBase;
      }
    }

    function estimateWinProb(teamAName, teamBName) {
      const a = teamIndex.get(normalizeName(teamAName));
      const b = teamIndex.get(normalizeName(teamBName));
      if (!a || !b) return 0.5;
      const diff = Number(a.power || 0) - Number(b.power || 0);
      return 1 / (1 + Math.pow(10, -diff / 11));
    }

    function canonicalSeedPair(seedA, seedB) {
      const a = Number(seedA);
      const b = Number(seedB);
      if (!Number.isFinite(a) || !Number.isFinite(b)) return '';
      return Math.min(a, b) + 'v' + Math.max(a, b);
    }

    function orderRegionR64Matchups(rows) {
      const list = Array.isArray(rows) ? rows.slice() : [];
      return list.sort((a, b) => {
        const aSlot = Number(a?.slot);
        const bSlot = Number(b?.slot);
        const aHas = Number.isFinite(aSlot);
        const bHas = Number.isFinite(bSlot);
        if (aHas && bHas && aSlot !== bSlot) return aSlot - bSlot;
        if (aHas && !bHas) return -1;
        if (!aHas && bHas) return 1;
        const pairA = canonicalSeedPair(a?.t1?.seed, a?.t2?.seed);
        const pairB = canonicalSeedPair(b?.t1?.seed, b?.t2?.seed);
        const slotA = Number(r64SlotByPair[pairA]);
        const slotB = Number(r64SlotByPair[pairB]);
        const slotAHas = Number.isFinite(slotA);
        const slotBHas = Number.isFinite(slotB);
        if (slotAHas && slotBHas && slotA !== slotB) return slotA - slotB;
        if (slotAHas && !slotBHas) return -1;
        if (!slotAHas && slotBHas) return 1;
        return Number(a?.game_number || 0) - Number(b?.game_number || 0);
      });
    }

    function linkParent(childId, parentId) {
      if (!parentMap.has(childId)) parentMap.set(childId, []);
      parentMap.get(childId).push(parentId);
      const child = nodesById.get(childId);
      if (child) child.parent = parentId;
    }

    function makeRegionMatchupMap(rows) {
      const byRegion = {};
      for (const row of (rows || [])) {
        const region = String(row?.region || '').trim();
        if (!region) continue;
        if (!byRegion[region]) byRegion[region] = [];
        byRegion[region].push(row);
      }
      for (const key of Object.keys(byRegion)) {
        byRegion[key] = orderRegionR64Matchups(byRegion[key]);
      }
      return byRegion;
    }

    function buildTree(regionMatchups, regionList) {
      nodesById = new Map();
      parentMap = new Map();
      regionRoundIds = {};
      finalIds = { F4: [], NCG: [] };
      const byRegion = (regionMatchups && typeof regionMatchups === 'object')
        ? regionMatchups
        : makeRegionMatchupMap(baseMatchups);
      const activeRegions = Array.isArray(regionList) && regionList.length ? regionList.slice() : regions.slice();
      const canonicalRegionByNorm = new Map();
      for (const region of activeRegions) {
        const key = normalizeRegionName(region);
        if (key && !canonicalRegionByNorm.has(key)) canonicalRegionByNorm.set(key, region);
      }

      for (const region of activeRegions) {
        const r64 = orderRegionR64Matchups(byRegion[region] || []);
        const ids = { R64: [], R32: [], S16: [], E8: [] };
        for (let i = 0; i < 8; i++) {
          const m = r64[i] || null;
          const id = `${region}-R64-${i}`;
          nodesById.set(id, makeNode(id, 'R64', region, m, [], i));
          ids.R64.push(id);
        }
        for (let i = 0; i < 4; i++) {
          const c1 = ids.R64[i * 2];
          const c2 = ids.R64[i * 2 + 1];
          const id = `${region}-R32-${i}`;
          nodesById.set(id, makeNode(id, 'R32', region, null, [c1, c2], i));
          ids.R32.push(id);
          linkParent(c1, id); linkParent(c2, id);
        }
        for (let i = 0; i < 2; i++) {
          const c1 = ids.R32[i * 2];
          const c2 = ids.R32[i * 2 + 1];
          const id = `${region}-S16-${i}`;
          nodesById.set(id, makeNode(id, 'S16', region, null, [c1, c2], i));
          ids.S16.push(id);
          linkParent(c1, id); linkParent(c2, id);
        }
        const e8id = `${region}-E8-0`;
        nodesById.set(e8id, makeNode(e8id, 'E8', region, null, [ids.S16[0], ids.S16[1]], 0));
        ids.E8.push(e8id);
        linkParent(ids.S16[0], e8id); linkParent(ids.S16[1], e8id);
        regionRoundIds[region] = ids;
      }

      const pairings = Array.isArray(finalFourPairings) && finalFourPairings.length >= 2
        ? finalFourPairings
        : defaultFinalFourPairings;
      const resolveRegion = (raw) => {
        const exact = String(raw || '');
        if (regionRoundIds[exact]) return exact;
        return canonicalRegionByNorm.get(normalizeRegionName(raw)) || exact;
      };
      const candidatePairs = pairings.map((pair) => [resolveRegion(pair?.[0]), resolveRegion(pair?.[1])]);
      const isValidPair = (pair) => Array.isArray(pair) && pair.length >= 2 && regionRoundIds[pair[0]] && regionRoundIds[pair[1]];
      let activePairs = candidatePairs;
      if (!isValidPair(candidatePairs[0]) || !isValidPair(candidatePairs[1])) {
        const available = Object.keys(regionRoundIds);
        if (available.length >= 4) {
          activePairs = [[available[0], available[1]], [available[2], available[3]]];
        } else {
          return;
        }
      }
      const f4a = 'F4-0';
      const f4b = 'F4-1';
      const ncg = 'NCG-0';
      const pair1a = regionRoundIds[activePairs[0][0]].E8[0];
      const pair1b = regionRoundIds[activePairs[0][1]].E8[0];
      const pair2a = regionRoundIds[activePairs[1][0]].E8[0];
      const pair2b = regionRoundIds[activePairs[1][1]].E8[0];
      nodesById.set(f4a, makeNode(f4a, 'F4', 'F4', null, [pair1a, pair1b], 0));
      nodesById.set(f4b, makeNode(f4b, 'F4', 'F4', null, [pair2a, pair2b], 1));
      nodesById.set(ncg, makeNode(ncg, 'NCG', 'NCG', null, [f4a, f4b], 0));
      linkParent(pair1a, f4a); linkParent(pair1b, f4a);
      linkParent(pair2a, f4b); linkParent(pair2b, f4b);
      linkParent(f4a, ncg); linkParent(f4b, ncg);
      finalIds.F4 = [f4a, f4b];
      finalIds.NCG = [ncg];
    }

    function calcDownstreamExposure(round) {
      const start = roundOrder.indexOf(round);
      let total = 0;
      for (let i = start; i < roundOrder.length; i++) total += roundPoints[roundOrder[i]];
      return total;
    }

    function getMatchTeams(node) {
      if (!node) return [null, null];
      if (node.round === 'R64') return [node.source?.t1 || null, node.source?.t2 || null];
      const t1 = getWinnerTeam(node.children[0]);
      const t2 = getWinnerTeam(node.children[1]);
      return [t1 || null, t2 || null];
    }

    function getWinnerTeam(matchId) {
      const node = nodesById.get(matchId);
      if (!node) return null;
      const [t1, t2] = getMatchTeams(node);
      const pick = bracketState.picks[matchId];
      if (!pick) return null;
      if (t1 && t1.name === pick) return t1;
      if (t2 && t2.name === pick) return t2;
      return null;
    }

    function clearDescendantPicks(matchId) {
      const queue = [...(parentMap.get(matchId) || [])];
      const seen = new Set();
      while (queue.length) {
        const id = queue.shift();
        if (seen.has(id)) continue;
        seen.add(id);
        delete bracketState.picks[id];
        customOverrideNodes.delete(id);
        for (const p of (parentMap.get(id) || [])) queue.push(p);
      }
    }

    async function makePick(matchId, winnerName, opts = {}) {
      const node = nodesById.get(matchId);
      if (!node || !winnerName) return;
      bracketState.picks[matchId] = winnerName;
      if (activeStrategy && strategyBaselinePicks[matchId] && strategyBaselinePicks[matchId] !== winnerName) {
        customOverrideNodes.add(matchId);
        activeStrategy = '';
        bracketState.activeStrategy = 'custom';
      } else if (strategyBaselinePicks[matchId] && strategyBaselinePicks[matchId] === winnerName) {
        customOverrideNodes.delete(matchId);
      }
      clearDescendantPicks(matchId);
      saveState();
      renderAll();
      if (!opts.keepCardOpen) closeCard(true, false);
      for (const parentId of (parentMap.get(matchId) || [])) {
        const parentNode = nodesById.get(parentId);
        if (!parentNode) continue;
        const [pt1, pt2] = getMatchTeams(parentNode);
        if (!pt1 || !pt2) continue;
        if (getCachedMatchup(pt1.name, pt2.name)) continue;
        try {
          const data = await getMatchupForTeams(pt1.name, pt2.name);
          if (!data) continue;
          renderAll();
        } catch (e) {}
      }
    }

    function validPickForNode(node) {
      const [t1, t2] = getMatchTeams(node);
      const pick = bracketState.picks[node.id];
      return !!pick && ((t1 && t1.name === pick) || (t2 && t2.name === pick));
    }

    function computeCompletion() {
      const counts = { R64: 0, R32: 0, S16: 0, E8: 0, F4: 0, NCG: 0, total: 0 };
      for (const node of nodesById.values()) {
        const [t1, t2] = getMatchTeams(node);
        if (!t1 || !t2) continue;
        if (validPickForNode(node)) {
          counts[node.round] += 1;
          counts.total += 1;
        }
      }
      bracketState.completion = counts;
      return counts;
    }

    function prerequisiteRound(node) {
      if (!node?.children?.length) return node?.round || 'R64';
      const childRound = nodesById.get(node.children[0])?.round || node.round;
      return childRound;
    }

    function teamRow(node, team, pick, prob) {
      if (!team) {
        const prereq = prerequisiteRound(node);
        return '<div class="team-row">' +
          '<span class="seed">-</span>' +
          '<button class="team-btn" disabled>Pick ' + prereq + ' to unlock</button>' +
          '<span class="prob">--</span>' +
          '<button class="info" disabled>i</button>' +
        '</div>';
      }
      const disabled = '';
      const winner = team && pick === team.name ? 'winner' : '';
      const seedValue = Number.isFinite(Number(team?.seed)) ? Number(team.seed) : (team?.seed ?? '-');
      const displayName = getDisplayName(team?.name || 'TBD');
      const normalizedProb = normalizeProbability(prob, null);
      return '<div class="team-row">' +
        '<span class="seed">' + seedValue + '</span>' +
        '<button class="team-btn ' + winner + '" ' + disabled + ' onclick="makePick(\'' + node.id + '\',\'' + (team?.name || '').replace(/'/g, "\\'") + '\')">' + displayName + '</button>' +
        '<span class="prob">' + (Number.isFinite(normalizedProb) ? (normalizedProb * 100).toFixed(1) + '%' : '--') + '</span>' +
        '<button class="info" onclick="openCard(\'' + node.id + '\')">i</button>' +
      '</div>';
    }

    function renderMatch(node) {
      const [t1, t2] = getMatchTeams(node);
      const pick = bracketState.picks[node.id] || '';
      let p1 = null;
      let p2 = null;
      if (node.round === 'R64' && node.source) {
        p1 = node.source.t1?.win_probability ?? null;
        p2 = node.source.t2?.win_probability ?? null;
      } else if (t1 && t2) {
        p1 = estimateWinProb(t1.name, t2.name);
        p2 = 1 - p1;
      }
      const pickedClass = validPickForNode(node) ? 'picked' : '';
      const overrideClass = customOverrideNodes.has(node.id) ? 'strategy-overridden' : '';
      let metaHtml = '';
      if (validPickForNode(node)) {
        const matchMeta = node.source?.matchup_meta || {};
        const ep = getNodeEp(node, pick);
        const t1Prob = normalizeProbability(p1, 0.5);
        const favoredProb = Math.max(t1Prob, 1 - t1Prob);
        const conf = getConfidenceLabel(favoredProb);
        const upsetFlag = getDisplayFlag(matchMeta, t1Prob, t1?.seed, t2?.seed);
        const upsetLabel = String(upsetFlag || '').replace(/_/g, ' ').toUpperCase();
        const showUpsetFlag = upsetFlag === 'upset_alert' || upsetFlag === 'upset_watch' || upsetFlag === 'competitive';
        metaHtml = '<div class="pick-meta ' + roundEpClass(node.round, ep) + '">' +
          '<span>EP: ' + ep.toFixed(1) + '</span>' +
          '<span style="color:' + conf.color + '">' + conf.label + '</span>' +
          (showUpsetFlag ? ('<span class="upset-flag ' + upsetFlag + '">' + upsetLabel + '</span>') : '') +
        '</div>';
      }
      const regionAttr = escAttr(String(node.region || '').toLowerCase());
      const roundAttr = escAttr(roundDataValue(node.round));
      const matchupAttr = escAttr(String(node.id || '').toLowerCase().replace(/[^a-z0-9]+/g, '-'));
      return '<div class="match ' + pickedClass + ' ' + overrideClass + '"' +
        ' data-region="' + regionAttr + '"' +
        ' data-round="' + roundAttr + '"' +
        ' data-matchup-id="' + matchupAttr + '"' +
        ' data-team-a="' + escAttr(t1?.name || '') + '"' +
        ' data-team-b="' + escAttr(t2?.name || '') + '"' +
        ' data-seed-a="' + escAttr(t1?.seed || '') + '"' +
        ' data-seed-b="' + escAttr(t2?.seed || '') + '"' +
        ' onclick="onMatchClick(event,\'' + node.id + '\')">' +
        teamRow(node, t1, pick, p1) +
        teamRow(node, t2, pick, p2) +
        metaHtml +
      '</div>';
    }

    function renderRegion(region) {
      const ids = regionRoundIds[region];
      if (!ids) return '';
      return '<section class="region">' +
        '<h2>' + region + '</h2>' +
        '<div class="round-col visible" data-round="R64"><div class="round-title">' + getRoundTitle('R64') + '</div>' + ids.R64.map((id) => renderMatch(nodesById.get(id))).join('') + roundSummary(ids.R64, 'R64') + '</div>' +
        '<div class="round-col" data-round="R32"><div class="round-title">' + getRoundTitle('R32') + '</div>' + ids.R32.map((id) => renderMatch(nodesById.get(id))).join('') + roundSummary(ids.R32, 'R32') + '</div>' +
        '<div class="round-col" data-round="S16"><div class="round-title">' + getRoundTitle('S16') + '</div>' + ids.S16.map((id) => renderMatch(nodesById.get(id))).join('') + roundSummary(ids.S16, 'S16') + '</div>' +
        '<div class="round-col" data-round="E8"><div class="round-title">' + getRoundTitle('E8') + '</div>' + ids.E8.map((id) => renderMatch(nodesById.get(id))).join('') + roundSummary(ids.E8, 'E8') + '</div>' +
      '</section>';
    }

    function renderFinals() {
      const f4html = finalIds.F4.map((id) => renderMatch(nodesById.get(id))).join('');
      const ncghtml = finalIds.NCG.map((id) => renderMatch(nodesById.get(id))).join('');
      document.getElementById('finals').innerHTML =
        '<div><div class="round-title">' + getRoundTitle('F4') + '</div>' + f4html + roundSummary(finalIds.F4, 'F4') + '</div>' +
        '<div><div class="round-title">' + getRoundTitle('NCG') + '</div>' + ncghtml + roundSummary(finalIds.NCG, 'NCG') + '</div>' +
        '<div><div class="round-title">Champion</div>' + championBlock() + '</div>';
    }

    function roundSummary(ids, round) {
      let ep = 0;
      let picks = 0;
      for (const id of (ids || [])) {
        const node = nodesById.get(id);
        const pick = bracketState.picks[id];
        if (!node || !pick || !validPickForNode(node)) continue;
        picks += 1;
        ep += getNodeEp(node, pick);
      }
      const max = ((ids || []).length * (roundPoints[round] || 0));
      return '<div class="round-summary">' + getRoundTitle(round) + '<br>Your picks: ' + ep.toFixed(1) + ' EP / ' + max.toFixed(0) + ' max</div>';
    }

    function championBlock() {
      const champId = finalIds.NCG[0];
      const winner = getWinnerTeam(champId);
      if (!winner) {
        return '<div class="match"' +
          ' data-region="final-four" data-round="2" data-matchup-id="championship"' +
          ' data-team-a="" data-team-b="" data-seed-a="" data-seed-b="" onclick="onMatchClick(event,\'' + champId + '\')">' +
          '<div class="team-row"><span class="seed">-</span><button class="team-btn" disabled>TBD</button><span class="prob">--</span><button class="info" onclick="openCard(\'' + champId + '\')">i</button></div></div>';
      }
      return '<div class="match picked"' +
        ' data-region="final-four" data-round="2" data-matchup-id="championship"' +
        ' data-team-a="' + escAttr(winner.name) + '" data-team-b="" data-seed-a="' + escAttr(winner.seed || '') + '" data-seed-b="" onclick="onMatchClick(event,\'' + champId + '\')">' +
        '<div class="team-row"><span class="seed">' + (winner.seed ?? '-') + '</span><button class="team-btn winner" onclick="openCard(\'' + champId + '\')">' + getDisplayName(winner.name) + ' Champion</button><span class="prob">100%</span><button class="info" onclick="openCard(\'' + champId + '\')">i</button></div></div>';
    }

    function renderProgress() {
      const c = computeCompletion();
      const pct = Math.round((c.total / 63) * 100);
      let totalEp = 0;
      for (const node of nodesById.values()) {
        const pick = bracketState.picks[node.id];
        if (!pick || !validPickForNode(node)) continue;
        totalEp += getNodeEp(node, pick);
      }
      document.getElementById('progress-text').innerHTML = c.total + ' <span class="slash">/</span> 63';
      document.getElementById('completion-text').textContent = pct + '%';
      document.getElementById('progress-bar').style.width = pct + '%';
      const epEl = document.getElementById('custom-ep');
      if (epEl) epEl.textContent = totalEp.toFixed(0);
      const modeEl = document.getElementById('strategy-mode');
      if (modeEl) modeEl.textContent = activeStrategy ? (activeStrategy.toUpperCase()) : 'Custom';
      const pills = document.querySelectorAll('.strategy-pill');
      pills.forEach((pill) => {
        const key = pill.dataset.strategy;
        pill.classList.toggle('active', !!activeStrategy && key === activeStrategy);
      });
      bracketState.activeStrategy = activeStrategy || 'custom';
      saveState();
    }

    function renderAll() {
      const regionsEl = document.getElementById('regions');
      regionsEl.innerHTML = regions.map((region) => renderRegion(region)).join('');
      renderFinals();
      renderProgress();
      applyMobileRoundVisibility();
    }

    function closeCard(instant = true, cancelAuto = false) {
      const overlay = document.getElementById('overlay');
      const card = document.getElementById('card');
      if (!overlay || !card) return;
      if (cancelAuto) {
        autoAdvanceEnabled = false;
        clearPreviewTimers();
        setInteractionLock(false);
        const container = document.querySelector('.container');
        if (container) container.style.transform = 'scale(1)';
        const banner = document.getElementById('flowBanner');
        if (banner) banner.classList.remove('show');
      }
      guidedNodeId = '';
      analysisToken += 1;
      if (instant) overlay.classList.add('instant');
      overlay.classList.remove('open');
      setTimeout(() => {
        card.innerHTML = '';
        overlay.classList.remove('instant');
      }, instant ? 0 : 180);
    }

    function onMatchClick(event, nodeId) {
      if (flowLocked) return;
      const target = event?.target;
      if (target && target.closest && target.closest('button')) return;
      const node = nodesById.get(nodeId);
      if (!node || !isNodePickable(node) || validPickForNode(node)) return;
      autoAdvanceEnabled = true;
      openCard(nodeId, { manualResume: true, autoResume: true });
    }

    async function guidedPickCurrent() {
      if (!guidedNodeId || flowLocked) return;
      const node = nodesById.get(guidedNodeId);
      if (!node) return;
      const [t1, t2] = getMatchTeams(node);
      if (!t1 || !t2) return;
      const data = await getCardData(node);
      const t1Prob = Number(data?.t1?.win_probability || 0);
      const t2Prob = Number(data?.t2?.win_probability || 0);
      const winnerName = t1Prob >= t2Prob ? t1.name : t2.name;
      await makePick(node.id, winnerName);
      if (!autoAdvanceEnabled) return;
      const next = findNextFlowTarget(node.id);
      if (!next) return;
      if (next.round === node.round && next.region === node.region) {
        openCard(next.id, { manualResume: false, autoResume: true });
        return;
      }
      previewRegionCompletion(node.region, next);
    }

    function fallbackMeta(node) {
      const [t1, t2] = getMatchTeams(node);
      const roundLabel = {
        R32: 'Round of 32',
        S16: 'Sweet 16',
        E8: 'Elite 8',
        F4: 'Final Four',
        NCG: 'Championship'
      }[node.round] || node.round;
      return {
        matchup_id: node.id,
        round: node.round,
        region: node.region,
        t1: t1 || { name: 'TBD', seed: '-' },
        t2: t2 || { name: 'TBD', seed: '-' },
        matchup_meta: {
          display_flag: 'toss_up',
          confidence: 'projected',
          risk: { tier: 'medium', reason: roundLabel + ' matchup - model data available after both teams are picked' },
          chatbot_prompt: t1 && t2
            ? ('Compare ' + t1.name + ' vs ' + t2.name + ' in the ' + roundLabel)
            : 'How should this pick fit my bracket strategy?',
          seed_matchup: null,
          archetype_h2h: null,
          pool_meta: { leverage_delta: 0 }
        }
      };
    }

    function buildSyntheticMeta(t1, t2, prob, tA, tB, node) {
      const normProb = normalizeProbability(prob, 0.5);
      const bestP = Math.max(normProb, 1 - normProb);
      const t1Favored = normProb >= 0.5;
      const bestTeam = t1Favored ? t1 : t2;
      const bestData = t1Favored ? tA : tB;
      const otherData = t1Favored ? tB : tA;
      let confidence = 'toss_up';
      if (bestP >= 0.95) confidence = 'lock';
      else if (bestP >= 0.80) confidence = 'confident';
      else if (bestP >= 0.65) confidence = 'lean';
      else if (bestP >= 0.55) confidence = 'slight_edge';
      let displayFlag = getUpsetFlag(t1?.seed, t2?.seed, normProb) || 'chalk';
      if (displayFlag === 'chalk' && bestP < 0.55) displayFlag = 'toss_up';
      const roundLabel = { R32: 'Round of 32', S16: 'Sweet 16', E8: 'Elite 8', F4: 'Final Four', NCG: 'Championship' }[node.round] || node.round;
      let archetype_h2h = null;
      if (Array.isArray(tA?.archetypes) && Array.isArray(tB?.archetypes) && tA.archetypes[0] && tB.archetypes[0]) {
        archetype_h2h = {
          label: tA.archetypes[0] + ' vs ' + tB.archetypes[0],
          t1_archetype_win_pct: null,
          sample_size: null
        };
      }
      const bestSeed = Number(bestTeam?.seed ?? 99);
      const otherSeed = Number((t1Favored ? t2 : t1)?.seed ?? 99);
      return {
        confidence,
        display_flag: displayFlag,
        upset_flag: displayFlag,
        model_agrees_with_seed: bestSeed <= otherSeed,
        predicted_winner: bestTeam?.name || null,
        seed_matchup: null,
        archetype_h2h,
        pool_meta: {
          leverage_delta: null,
          contrarian_flag: false,
          points_this_round: roundPoints[node.round] || 1
        },
        risk: {
          tier: bestP >= 0.75 ? 'low' : bestP >= 0.60 ? 'medium' : 'high',
          reason: roundLabel + ' projected matchup' + (bestP >= 0.75 ? ' - strong favorite' : bestP >= 0.60 ? ' - moderate edge' : ' - toss-up territory')
        },
        chatbot_prompt: 'Compare ' + t1.name + ' vs ' + t2.name + ' in the ' + roundLabel,
        responses: {
          quick: (bestTeam?.name || 'Team') + ' is the model pick at ' + (bestP * 100).toFixed(0) + '%.'
        },
        winning_team_context: bestData?.archetypes?.[0] || null,
        underdog_context: otherData?.archetypes?.[0] || null
      };
    }

    async function getCardData(node) {
      const [t1, t2] = getMatchTeams(node);
      if (!t1 || !t2) return fallbackMeta(node);
      if (node.round === 'R64' && node.source) return node.source;
      const tA = teamIndex.get(normalizeName(t1.name)) || {};
      const tB = teamIndex.get(normalizeName(t2.name)) || {};
      const prob = estimateWinProb(t1.name, t2.name);
      const pickPct1 = Number(tA.pool?.public_pick_pct);
      const pickPct2 = Number(tB.pool?.public_pick_pct);
      const synthetic = {
        matchup_id: node.id,
        round: node.round,
        region: node.region,
        t1: {
          ...tA,
          ...t1,
          win_probability: prob,
          archetypes: tA.archetypes || t1.archetypes || [],
          archetype_icons: tA.archetype_icons || t1.archetype_icons || '',
          key_players: tA.key_players || t1.key_players || [],
          primary_comp: tA.primary_comp || t1.primary_comp || null,
          pool: tA.pool || t1.pool || {
            public_pick_pct: Number.isFinite(pickPct1) ? pickPct1 : null,
            public_pick_pct_source: 'projected'
          },
          color_primary: tA.color_primary || t1.color_primary || 'var(--text-muted)'
        },
        t2: {
          ...tB,
          ...t2,
          win_probability: 1 - prob,
          archetypes: tB.archetypes || t2.archetypes || [],
          archetype_icons: tB.archetype_icons || t2.archetype_icons || '',
          key_players: tB.key_players || t2.key_players || [],
          primary_comp: tB.primary_comp || t2.primary_comp || null,
          pool: tB.pool || t2.pool || {
            public_pick_pct: Number.isFinite(pickPct2) ? pickPct2 : null,
            public_pick_pct_source: 'projected'
          },
          color_primary: tB.color_primary || t2.color_primary || 'var(--text-muted)'
        },
        matchup_meta: buildSyntheticMeta(t1, t2, prob, tA, tB, node)
      };
      try {
        const m = await getMatchupForTeams(t1.name, t2.name);
        if (!m) return synthetic;
        const mT1Name = normalizeName(m?.t1?.name);
        const mT2Name = normalizeName(m?.t2?.name);
        const wantedT1 = normalizeName(t1.name);
        const wantedT2 = normalizeName(t2.name);
        const apiT1 = mT1Name === wantedT1 ? m?.t1 : (mT2Name === wantedT1 ? m?.t2 : null);
        const apiT2 = mT1Name === wantedT2 ? m?.t1 : (mT2Name === wantedT2 ? m?.t2 : null);
        const p1 = toProb(apiT1?.win_probability, null);
        const p2 = toProb(apiT2?.win_probability, null);
        const resolvedP1 = Number.isFinite(p1) ? p1 : (Number.isFinite(p2) ? (1 - p2) : normalizeProbability(prob, 0.5));
        const resolvedP2 = Number.isFinite(p2) ? p2 : (1 - resolvedP1);
        return {
          ...synthetic,
          matchup_id: m?.matchup_id || synthetic.matchup_id,
          t1: {
            ...(synthetic.t1 || t1),
            ...(apiT1 || {}),
            name: t1.name,
            seed: apiT1?.seed ?? t1.seed,
            win_probability: resolvedP1
          },
          t2: {
            ...(synthetic.t2 || t2),
            ...(apiT2 || {}),
            name: t2.name,
            seed: apiT2?.seed ?? t2.seed,
            win_probability: resolvedP2
          },
          matchup_meta: {
            ...(synthetic.matchup_meta || {}),
            ...(m?.matchup_meta || {})
          }
        };
      } catch (e) {
        return synthetic;
      }
    }

    function applyMobileRoundVisibility() {
      const tabs = document.getElementById('roundTabs');
      if (!tabs) return;
      const round = mobileRound || 'R64';
      document.querySelectorAll('.round-tab').forEach((t) => t.classList.toggle('active', t.dataset.round === round));
      document.querySelectorAll('.round-col').forEach((col) => {
        col.classList.toggle('visible', col.dataset.round === round);
      });
      const finalsEl = document.getElementById('finals-section');
      if (window.innerWidth <= 760) {
        finalsEl.style.display = round === 'F4' ? 'block' : 'none';
      } else {
        finalsEl.style.display = 'block';
      }
    }

    function getConfidenceLabel(winProb) {
      const p = normalizeProbability(winProb, 0);
      const pct = p * 100;
      if (pct >= 95) return { label: 'LOCK', color: '#d4af37' };
      if (pct >= 80) return { label: 'CONFIDENT', color: '#5cb85c' };
      if (pct >= 65) return { label: 'LEAN', color: '#f0ad4e' };
      if (pct >= 55) return { label: 'SLIGHT EDGE', color: '#b0b0b0' };
      return { label: 'TOSS-UP', color: '#d9534f' };
    }

    function getUpsetFlag(t1Seed, t2Seed, t1WinProb) {
      const s1 = Number(t1Seed);
      const s2 = Number(t2Seed);
      if (!Number.isFinite(s1) || !Number.isFinite(s2)) return null;
      const higherSeed = Math.min(s1, s2);
      const lowerSeed = Math.max(s1, s2);
      const seedDiff = lowerSeed - higherSeed;
      if (seedDiff <= 1) return null;
      const t1Prob = normalizeProbability(t1WinProb, 0.5);
      const t2Prob = 1 - t1Prob;
      const underdogFavored = (s1 > s2 && t1Prob > 0.5) || (s2 > s1 && t2Prob > 0.5);
      if (underdogFavored) return 'upset_alert';
      const favoredProb = Math.max(t1Prob, t2Prob);
      if (seedDiff >= 3 && favoredProb < 0.65) return 'upset_watch';
      if (seedDiff >= 5 && favoredProb < 0.75) return 'competitive';
      return null;
    }

    function getDisplayFlag(meta, t1p, t1Seed, t2Seed) {
      const upset = getUpsetFlag(t1Seed, t2Seed, t1p);
      if (upset) return upset;
      const p = Math.max(normalizeProbability(t1p, 0.5), 1 - normalizeProbability(t1p, 0.5));
      if (p >= 0.95) return 'lock';
      if (meta?.pool_meta?.contrarian_flag) return 'leverage_play';
      if (p < 0.55) return 'toss_up';
      return 'chalk';
    }

    function leverageText(delta) {
      if (delta == null || !Number.isFinite(Number(delta))) return 'Not available';
      const d = Number(delta);
      const abs = Math.abs(d);
      if (abs < 0.03) return "Neutral - this pick won't differentiate your bracket";
      if (d > 0.08) return 'High leverage - contrarian upside if this team wins';
      if (d > 0.03) return 'Moderate leverage - some pool value';
      if (d < -0.08) return 'Negative leverage - everyone has this pick, no edge';
      return 'Slight negative leverage - popular pick with limited pool upside';
    }

    function exposureText(round, meta) {
      const pts = roundPoints[round] || 1;
      const nextRound = roundOrder[roundOrder.indexOf(round) + 1];
      const nextRoundPts = roundPoints[nextRound] || 0;
      return 'Worth ' + pts + ' pt' + (pts > 1 ? 's' : '') + ' this round' +
        (nextRoundPts ? ', ' + nextRoundPts + ' pts if they advance' : '');
    }

    function badgeClass(flag) {
      const f = String(flag || 'chalk').toLowerCase().replace(/\s+/g, '_');
      const valid = ['chalk', 'upset_alert', 'upset_watch', 'competitive', 'leverage_play', 'toss_up', 'lock'];
      return valid.includes(f) ? f : 'chalk';
    }

    function compLine(teamName, comp) {
      if (!comp) return '<div class="comp-line"><span class="comp-team">' + teamName + '</span><span class="comp-detail" style="color:var(--muted)">No historical comp available</span></div>';
      return '<div class="comp-line">' +
        '<span class="comp-team">' + teamName + '</span>' +
        '<span class="comp-arrow">-></span>' +
        '<span class="comp-detail">' + comp.name + ' \'' + String(comp.season).slice(-2) +
        (comp.seed ? ' (#' + comp.seed + ')' : '') + ' - ' + comp.result + '</span>' +
        '<span class="comp-sim">' + (Number(comp.similarity || 0) * 100).toFixed(0) + '% match</span>' +
      '</div>';
    }

    function upsetBadgeClass(flag) {
      const v = String(flag || '').toLowerCase();
      if (v.includes('strong')) return 'strong';
      if (v.includes('slight')) return 'slight';
      if (v.includes('vulnerable')) return 'vulnerable';
      return 'chalk';
    }

    function renderCard(data, node) {
      const card = document.getElementById('card');
      if (!card) return;
      const meta = data.matchup_meta || {};
      const t1 = data.t1 || {};
      const t2 = data.t2 || {};
      const t1p = normalizeProbability(t1.win_probability, 0.5);
      const t2p = normalizeProbability(t2.win_probability, 1 - t1p);
      const modelTeam = t1p >= t2p ? t1 : t2;
      const modelName = modelTeam?.name || 'TBD';
      const modelDisplayName = getDisplayName(modelName);
      const t1DisplayName = getDisplayName(t1.name || 'TBD');
      const t2DisplayName = getDisplayName(t2.name || 'TBD');
      const modelIsT1 = modelName && modelName === t1.name;
      const confidence = getConfidenceLabel(Math.max(t1p, t2p));
      const displayFlag = getDisplayFlag(meta, t1p, t1?.seed, t2?.seed);
      const metaFlag = String(meta.display_flag || meta.upset_flag || '').toLowerCase();
      const resolvedFlag = (metaFlag && metaFlag !== 'chalk' && badgeClass(metaFlag) !== 'chalk') ? metaFlag : displayFlag;
      const flagLabel = String(resolvedFlag || 'chalk').replace(/_/g, ' ').toUpperCase();
      const matchupPrompt = String(meta.chatbot_prompt || ('Compare ' + (t1.name || 'Team A') + ' vs ' + (t2.name || 'Team B') + ' in the ' + getRoundTitle(node.round).split(' (')[0]));
      const responses = meta.chatbot_responses || meta.responses || {};
      const blurbParts = [
        responses.quick,
        responses.value,
        responses.stats,
        responses.upset,
        responses.archetype,
        responses.historical,
        responses.seed_history,
      ].filter((v) => typeof v === 'string' && v.trim());
      const blurb = blurbParts.length
        ? blurbParts.join('\n\n')
        : (meta?.risk?.reason || meta?.form_and_risk?.matchup_risk_note || 'Model analysis unavailable for this matchup.');

      const archetypeMatchup = meta.archetype_matchup || meta.archetype_h2h || null;
      const keyFactors = meta.key_factors || null;
      const kenpom = meta.kenpom || null;
      const formRisk = meta.form_and_risk || null;
      const risk = riskBadge(meta?.risk?.tier || (formRisk?.matchup_risk_note ? 'medium' : 'low'));

      const toPct = (v) => {
        const n = Number(v);
        if (!Number.isFinite(n)) return null;
        if (n <= 1) return n * 100;
        if (n <= 100) return n;
        return null;
      };
      const pctText = (v, d = 1) => {
        const n = Number(v);
        return Number.isFinite(n) ? (n * 100).toFixed(d) + '%' : '--';
      };
      const pub1 = toPct(t1?.pool?.public_pick_pct);
      const pub2 = toPct(t2?.pool?.public_pick_pct);
      const leverage = meta?.pool_meta?.leverage_delta;
      const compA = t1.topComp || t1.primary_comp || null;
      const compB = t2.topComp || t2.primary_comp || null;
      const escPickA = String(t1?.name || '').replace(/'/g, "\\'");
      const escPickB = String(t2?.name || '').replace(/'/g, "\\'");
      const askHref = '/?q=' + encodeURIComponent(matchupPrompt);
      const archA = t1.archetype || (Array.isArray(t1.archetypes) ? t1.archetypes[0] : '') || 'Unknown';
      const archB = t2.archetype || (Array.isArray(t2.archetypes) ? t2.archetypes[0] : '') || 'Unknown';
      const playersFor = (team) => {
        const arr = Array.isArray(team?.key_players) ? team.key_players : [];
        if (!arr.length) return '<div class="tiny">No key player notes.</div>';
        return arr.slice(0, 4).map((p) => {
          if (typeof p === 'string') return '<div class="player-row"><span class="player-name">' + escHtml(p) + '</span></div>';
          return '<div class="player-row"><span class="player-name">' + escHtml(p?.name || 'Player') + '</span>' +
            '<span class="player-role">' + escHtml(p?.role || '') + '</span>' +
            '<span class="player-note">' + escHtml(p?.note || '') + '</span></div>';
        }).join('');
      };

      card.innerHTML =
        '<div class="card-head">' +
          '<span class="guided-label">' + roundBannerLabel(node.round, node.region) + '</span>' +
          '<button class="close" onclick="closeCard(true, true)">&times;</button>' +
        '</div>' +
        '<div class="guided-matchup">' +
          '<div class="guided-team-row ' + (modelIsT1 ? 'model' : '') + '">' +
            '<span class="guided-team-seed">' + (t1.seed ?? '-') + '</span>' +
            '<span class="guided-team-name">' + t1DisplayName + '</span>' +
            '<span class="guided-team-prob">' + pctText(t1p) + '</span>' +
          '</div>' +
          '<div class="guided-divider"></div>' +
          '<div class="guided-team-row ' + (!modelIsT1 ? 'model' : '') + '">' +
            '<span class="guided-team-seed">' + (t2.seed ?? '-') + '</span>' +
            '<span class="guided-team-name">' + t2DisplayName + '</span>' +
            '<span class="guided-team-prob">' + pctText(t2p) + '</span>' +
          '</div>' +
        '</div>' +
        '<div class="model-pick">' +
          '<span class="model-pick-label">Model Pick</span>' +
          '<span class="model-pick-team">' + escHtml(modelDisplayName) + '</span>' +
          '<span class="model-pick-prob">' + pctText(Math.max(t1p, t2p)) + '</span>' +
          '<span class="model-pick-conf" style="color:' + confidence.color + '">' + confidence.label + '</span>' +
        '</div>' +
        '<div class="guided-model">' +
          '<span class="guided-badge ' + badgeClass(resolvedFlag) + '">' + escHtml(flagLabel) + '</span>' +
          '<span class="tiny">Archetypes: ' + escHtml(archA) + ' vs ' + escHtml(archB) + '</span>' +
        '</div>' +
        '<div class="guided-analysis" id="guided-analysis">' + md(blurb) + '</div>' +

        '<div class="section">' +
          '<h3>Case</h3>' +
          '<div class="data-row"><span class="data-label">Archetype H2H</span><span class="data-value">' +
            (archetypeMatchup
              ? escHtml((archetypeMatchup.t1_arch || archA) + ' vs ' + (archetypeMatchup.t2_arch || archB) +
                (Number.isFinite(Number(archetypeMatchup.historical_wr))
                  ? (' | WR ' + (Number(archetypeMatchup.historical_wr) * 100).toFixed(1) + '% over n=' + Number(archetypeMatchup.historical_n || 0))
                  : ' | limited history'))
              : 'No archetype matchup history') +
          '</span></div>' +
          '<div class="data-row"><span class="data-label">Key Factors</span><span class="data-value">' +
            (keyFactors
              ? ('Elo Delta ' + (Number(keyFactors.elo_diff || 0)).toFixed(1) +
                 ' | Pyth ' + Number(keyFactors.t1_pyth || 0).toFixed(3) + ' vs ' + Number(keyFactors.t2_pyth || 0).toFixed(3) +
                 ' | NetEff ' + Number(keyFactors.t1_net_eff || 0).toFixed(1) + ' vs ' + Number(keyFactors.t2_net_eff || 0).toFixed(1))
              : 'No factor breakdown') +
          '</span></div>' +
          '<div class="data-row"><span class="data-label">KenPom</span><span class="data-value">' +
            (kenpom
              ? (escHtml((t1.name || 'T1') + ': O ' + Number(kenpom.t1_ortg || 0).toFixed(1) + ' D ' + Number(kenpom.t1_drtg || 0).toFixed(1) +
                ' | ' + (t2.name || 'T2') + ': O ' + Number(kenpom.t2_ortg || 0).toFixed(1) + ' D ' + Number(kenpom.t2_drtg || 0).toFixed(1)))
              : 'No KenPom matchup metrics') +
          '</span></div>' +
          compLine(t1DisplayName || 'Team A', compA) +
          compLine(t2DisplayName || 'Team B', compB) +
          '<div class="data-row"><span class="data-label">' + escHtml(t1DisplayName || 'Team A') + ' Players</span><span class="data-value"></span></div>' +
          playersFor(t1) +
          '<div class="data-row"><span class="data-label">' + escHtml(t2DisplayName || 'Team B') + ' Players</span><span class="data-value"></span></div>' +
          playersFor(t2) +
        '</div>' +

        '<div class="section">' +
          '<h3>Pool</h3>' +
          '<div class="data-row"><span class="data-label">Public Picks</span><span class="data-value">' +
            escHtml((t1DisplayName || 'T1') + ': ' + (pub1 == null ? 'N/A' : pub1.toFixed(1) + '%') + ' | ' +
              (t2DisplayName || 'T2') + ': ' + (pub2 == null ? 'N/A' : pub2.toFixed(1) + '%')) +
          '</span></div>' +
          '<div class="data-row"><span class="data-label">Leverage</span><span class="data-value">' + escHtml(leverageText(leverage)) + '</span></div>' +
          '<div class="data-row"><span class="data-label">Round Value</span><span class="data-value">' + escHtml(exposureText(node.round, meta)) + '</span></div>' +
        '</div>' +

        '<div class="section">' +
          '<h3>Risk</h3>' +
          '<div class="data-row"><span class="data-label">Confidence</span><span class="data-value" style="color:' + confidence.color + '">' + confidence.label + '</span></div>' +
          '<div class="data-row"><span class="data-label">Risk Tier</span><span class="data-value" style="color:' + risk.color + '">' + escHtml(risk.label) + '</span></div>' +
          '<div class="data-row"><span class="data-label">Risk Note</span><span class="data-value">' + escHtml(meta?.risk?.reason || formRisk?.matchup_risk_note || 'No added risk note.') + '</span></div>' +
          '<div class="data-row"><span class="data-label">Form</span><span class="data-value">' +
            escHtml((formRisk?.t1_momentum || 'n/a') + ' vs ' + (formRisk?.t2_momentum || 'n/a') +

          '<button class="pick-btn ' + (!modelIsT1 ? 'recommended' : '') + '" onclick="makePick(\'' + node.id + '\',\'' + escPickB + '\')">' + escHtml(t2DisplayName || 'Team 2') + '</button>' +
        '</div>' +
