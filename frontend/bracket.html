<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BracketGPT | Bracket</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500&family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
  :root {
    --bg-base: #0d0f12;
    --bg-surface: #141619;
    --bg-surface-2: #1e2124;
    --bg-line: #2a2d31;
    --accent: #C9A84C;
    --accent-hot: #e84b4b;
    --accent-dim: rgba(201,168,76,0.12);
    --text-primary: #e8eaed;
    --text-muted: #6b7280;
    --text-label: #9ca3af;
    --bg: var(--bg-base);
    --surface: var(--bg-surface);
    --surface-2: var(--bg-surface-2);
    --border: var(--bg-line);
    --text: var(--text-primary);
    --muted: var(--text-muted);
    --green: var(--accent);
    --yellow: var(--accent-dim);
    --orange: var(--accent-hot);
    --red: var(--accent-hot);
    --blue: var(--text-label);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Barlow', sans-serif;
    background: var(--bg-base);
    color: var(--text-primary);
    min-height: 100vh;
  }
  a { color: inherit; text-decoration: none; }
  button, input, select { font: inherit; }

  .nav {
    position: sticky;
    top: 0;
    z-index: 100;
    height: 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 16px;
    border-bottom: 1px solid var(--bg-line);
    background: var(--bg-base);
  }
  .brand {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .nav-links { display: flex; gap: 16px; height: 100%; align-items: stretch; }
  .nav-links a {
    display: inline-flex;
    align-items: center;
    height: 100%;
    border-bottom: 2px solid transparent;
    color: var(--text-muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .nav-links a.active { color: var(--text-primary); border-bottom-color: var(--accent); }

  .container {
    max-width: 1520px;
    margin: 0 auto;
    padding: 16px 16px 96px;
    transform-origin: top center;
    transition: transform 400ms ease-in-out;
  }
  .topbar {
    background: var(--bg-surface);
    border: 1px solid var(--bg-line);
    border-radius: 2px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .tophead { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
  .tophead h1 {
    margin: 0;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 32px;
    font-weight: 900;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn {
    height: 32px;
    border-radius: 2px;
    border: 1px solid var(--bg-line);
    padding: 0 12px;
    cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: border-color .12s, color .12s, background .12s;
  }
  .btn-secondary { background: transparent; color: var(--text-label); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #0d0f12; }
  .btn-primary:hover { background: #d1a63f; border-color: #d1a63f; }

  .progress-wrap { margin-top: 12px; }
  .progress-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  #progress-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  #progress-text .slash { color: var(--text-muted); padding: 0 4px; }
  #completion-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-label);
  }
  .progress { height: 4px; border: 1px solid var(--bg-line); border-radius: 2px; background: var(--bg-surface-2); overflow: hidden; }
  .progress > span { display: block; width: 0; height: 100%; background: var(--accent); transition: width .16s ease; }

  .strategy-bar {
    display: flex;
    gap: 12px;
    align-items: center;
    border: 1px solid var(--bg-line);
    border-radius: 2px;
    background: var(--bg-surface);
    padding: 12px;
    margin-bottom: 12px;
  }
  .strategy-control {
    flex: 1 1 auto;
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    border: 1px solid var(--bg-line);
    border-radius: 2px;
    overflow: hidden;
  }
  .strategy-pill {
    border: 0;
    border-right: 1px solid var(--bg-line);
    background: transparent;
    color: var(--text-muted);
    padding: 8px;
    min-height: 36px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .strategy-pill:last-child { border-right: 0; }
  .strategy-pill.active { background: var(--accent); color: #0d0f12; }
  .strategy-pill .strategy-inner { display: inline-flex; align-items: center; gap: 8px; }
  .strategy-pill .strategy-icon,
  .strategy-pill .strategy-icon svg,
  .optimizer-toggle .strategy-icon,
  .optimizer-toggle .strategy-icon svg,
  .opt-title svg,
  .finals h2 svg,
  .champ-header svg { width: 14px; height: 14px; stroke-width: 2.2; }
  .strategy-pill .strategy-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .strategy-pill .strategy-ep {
    min-width: 56px;
    min-height: 24px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--bg-line);
    border-radius: 2px;
    background: var(--bg-surface-2);
    color: var(--accent);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    line-height: 1;
    padding: 0 6px;
  }
  .strategy-pill.active .strategy-ep { color: #0d0f12; background: rgba(13,15,18,.12); border-color: rgba(13,15,18,.35); }
  .strategy-right { display: flex; align-items: center; gap: 8px; white-space: nowrap; }
  .custom-ep-counter {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-label);
  }
  .custom-ep-counter strong { color: var(--accent); }

  .round-tabs { display: none; overflow-x: auto; gap: 8px; padding: 8px 0; margin-bottom: 8px; }
  .round-tab {
    border: 1px solid var(--bg-line);
    border-radius: 2px;
    background: transparent;
    color: var(--text-muted);
    padding: 8px 12px;
    cursor: pointer;
    white-space: nowrap;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .round-tab.active { border-color: var(--accent); color: var(--accent); }

  .grid { display: grid; grid-template-columns: repeat(4, minmax(240px, 1fr)); gap: 12px; }
  .region { background: var(--bg-surface); border: 1px solid var(--bg-line); border-radius: 2px; padding: 12px; }
  .region h2 {
    margin: 0 0 8px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
  }
  .round-col { margin-bottom: 12px; }
  .round-title {
    margin: 0 0 8px;
    border-bottom: 1px solid var(--bg-line);
    padding-bottom: 4px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-label);
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }
  .round-summary {
    margin: 8px 0;
    padding-top: 8px;
    border-top: 1px solid var(--bg-line);
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.4;
  }

  .match {
    background: var(--bg-surface);
    border: 1px solid var(--bg-line);
    border-left: 3px solid transparent;
    border-radius: 2px;
    padding: 4px;
    margin-bottom: 8px;
    transition: background .12s, border-left-color .12s;
  }
  .match:hover { background: var(--bg-surface-2); cursor: pointer; }
  .match.picked { border-left-color: var(--accent); }
  .match.strategy-overridden { border-style: dashed; border-left-color: var(--accent-dim); }
  .team-row { display: grid; grid-template-columns: 18px 1fr auto auto; gap: 8px; align-items: center; margin-bottom: 4px; }
  .team-row:last-child { margin-bottom: 0; }
  .seed {
    width: 18px;
    text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    font-weight: 900;
    letter-spacing: 0.08em;
    color: var(--text-muted);
  }
  .team-btn {
    border: 0;
    background: transparent;
    color: var(--text-label);
    padding: 6px 0;
    text-align: left;
    cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    line-height: 1.1;
  }
  .team-btn:hover { color: var(--text-primary); }
  .team-btn.winner { color: var(--text-primary); font-weight: 700; }
  .team-btn:disabled { color: var(--text-muted); opacity: 1; cursor: default; font-style: italic; }
  .prob { min-width: 44px; text-align: right; font-size: 11px; font-weight: 400; color: var(--text-muted); }
  .info {
    width: 24px;
    height: 24px;
    border: 1px solid var(--bg-line);
    border-radius: 2px;
    background: transparent;
    color: var(--text-label);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .info:hover { border-color: var(--accent); color: var(--accent); }
  .info:disabled { opacity: .45; cursor: default; }

  .pick-meta {
    margin-top: 4px;
    border: 1px solid var(--bg-line);
    border-radius: 2px;
    background: var(--bg-surface-2);
    padding: 4px 8px;
    display: flex;
    justify-content: space-between;
    gap: 8px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-label);
  }
  .pick-meta.ep-good { border-color: var(--accent); color: var(--accent); }
  .pick-meta.ep-mid { color: var(--accent-dim); }
  .pick-meta.ep-low { color: var(--accent-hot); }
  .pick-meta .upset-flag { margin-left: auto; }
  .pick-meta .upset-flag.upset_alert { color: #d9534f; }
  .pick-meta .upset-flag.upset_watch { color: #f0ad4e; }
  .pick-meta .upset-flag.competitive { color: #d4af37; }

  .confidence-label.slight-edge { color: #b0b0b0; }
  .confidence-label.lean { color: #f0ad4e; }
  .confidence-label.confident { color: #5cb85c; }
  .confidence-label.lock { color: #d4af37; }
  .confidence-label.toss-up { color: #d9534f; }

  .finals { margin-top: 12px; border: 1px solid var(--bg-line); border-radius: 2px; background: var(--bg-surface); padding: 12px; }
  .finals h2 {
    margin: 0 0 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .final-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

  .skeleton { height: 72px; border: 1px solid var(--bg-line); border-radius: 2px; margin-bottom: 8px; background: var(--bg-surface); }
  .error {
    border: 1px solid var(--accent-hot);
    border-radius: 2px;
    background: var(--bg-surface);
    padding: 12px;
    margin-bottom: 12px;
    font-size: 13px;
    line-height: 1.4;
  }

  .optimizer-toggle { position: fixed; right: 12px; top: 64px; z-index: 140; display: inline-flex; align-items: center; gap: 8px; }
  .optimizer-panel {
    position: fixed;
    top: 104px;
    right: 0;
    width: min(360px, 95vw);
    max-height: calc(100vh - 120px);
    overflow: auto;
    transform: translateX(100%);
    transition: transform .18s ease;
    z-index: 130;
    border: 1px solid var(--bg-line);
    border-right: 0;
    background: var(--bg-base);
    padding: 12px;
  }
  .optimizer-panel.open { transform: translateX(0); }
  .opt-title {
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 900;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .opt-row { display: grid; grid-template-columns: 20px 1fr auto; gap: 8px; align-items: center; margin-bottom: 4px; font-size: 12px; }
  .champ-header {
    margin: 12px 0 8px;
    padding-top: 8px;
    border-top: 1px solid var(--bg-line);
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-label);
  }
  .champ-bar { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; margin-bottom: 8px; font-size: 12px; }
  .champ-bar span:first-child::after {
    content: '';
    display: inline-block;
    width: calc(var(--w, 0) * 1%);
    max-width: 160px;
    height: 6px;
    margin-left: 8px;
    border-radius: 2px;
    background: var(--accent);
    vertical-align: middle;
  }

  .flow-banner {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 200ms ease-in-out;
    z-index: 1002;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .flow-banner.show { opacity: 1; }
  .flow-locked .container,
  .flow-locked .nav,
  .flow-locked .mobile-tabs,
  .flow-locked .optimizer-toggle { pointer-events: none; }

  .overlay {
    position: fixed;
    inset: 0;
    display: none;
    z-index: 999;
    background: rgba(0,0,0,0.5);
  }
  .overlay.open { display: block; }
  .card {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 1000;
    height: 360px;
    max-height: 82vh;
    overflow: auto;
    border-top: 2px solid var(--accent);
    border-radius: 0;
    background: var(--bg-surface);
    padding: 20px 24px 28px;
    box-shadow: 0 -8px 32px rgba(0,0,0,0.6);
    transform: translateY(100%);
    transition: transform 180ms ease-out;
  }
  .overlay.open .card { transform: translateY(0); }
  .overlay.instant .card { transition: none; }

  .card-head { display:flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 12px; }
  .badge {
    border: 1px solid var(--bg-line);
    border-radius: 2px;
    padding: 4px 8px;
    background: var(--bg-surface-2);
    color: var(--text-label);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
  }
  .badge.upset_alert, .badge.upset_watch { color: var(--accent-hot); border-color: var(--accent-hot); }
  .badge.competitive, .badge.toss_up { color: var(--accent-dim); border-color: var(--accent-dim); }
  .badge.leverage_play, .badge.lock { color: var(--accent); border-color: var(--accent); }
  .close {
    width: 28px;
    height: 28px;
    border: 1px solid var(--bg-line);
    border-radius: 2px;
    background: transparent;
    color: var(--text-label);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 700;
  }
  .close:hover { border-color: var(--accent); color: var(--accent); }

  .guided-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-label);
  }
  .guided-matchup {
    margin-bottom: 12px;
    border: 1px solid var(--bg-line);
    border-radius: 2px;
    background: var(--bg-surface-2);
  }
  .guided-team-row {
    display: grid;
    grid-template-columns: 26px 1fr auto;
    gap: 8px;
    align-items: center;
    padding: 12px;
    border-left: 3px solid transparent;
  }
  .guided-team-row.model {
    border-left-color: var(--accent);
    background: var(--accent-dim);
    color: var(--text-primary);
  }
  .guided-divider {
    height: 1px;
    background: var(--bg-line);
    margin: 0 12px;
  }
  .guided-team-seed {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 900;
    color: var(--text-muted);
    letter-spacing: 0.08em;
  }
  .guided-team-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .guided-team-prob {
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: var(--accent);
    text-align: right;
  }
  .guided-model {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .guided-model-pick {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .guided-badge {
    padding: 4px 8px;
    border: 1px solid var(--bg-line);
    border-radius: 2px;
    background: var(--bg-surface-2);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .guided-badge.slight { color: #60a5fa; }
  .guided-badge.strong { color: #f87171; }
  .guided-badge.vulnerable { color: #fb923c; }
  .guided-analysis {
    min-height: 104px;
    margin-bottom: 12px;
    border: 1px solid var(--bg-line);
    border-radius: 2px;
    background: var(--bg-surface-2);
    padding: 12px;
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    font-weight: 400;
    line-height: 1.6;
    color: var(--text-primary);
  }
  .guided-analysis.loading {
    color: var(--text-label);
    animation: analysisPulse 1.1s ease-in-out infinite;
  }
  @keyframes analysisPulse {
    0% { opacity: 0.55; }
    50% { opacity: 1; }
    100% { opacity: 0.55; }
  }
  .guided-pick-btn {
    width: 100%;
    height: 48px;
    border: 1px solid var(--accent);
    border-radius: 2px;
    background: var(--accent);
    color: #0d0f12;
    cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .guided-pick-btn:hover { background: #d6b65b; border-color: #d6b65b; }
  .guided-pick-btn:disabled { opacity: 0.55; cursor: default; }

  .vs-row { display:grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center; margin-bottom: 12px; }
  .team-card { border: 1px solid var(--bg-line); border-radius: 2px; padding: 12px; background: var(--bg-surface-2); }
  .team-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .archetype-icons { min-height: 16px; margin: 4px 0; font-size: 12px; color: var(--text-label); }
  .prob-big { font-family: 'Barlow Condensed', sans-serif; font-size: 24px; font-weight: 900; line-height: 1; letter-spacing: .04em; }
  .tiny { font-size: 12px; color: var(--text-muted); }

<body>

  <div class="overlay" id="overlay" onclick="if(event.target.id==='overlay') closeCard(true, true)">
    <div class="card" id="card"></div>

  <div class="flow-banner" id="flowBanner"></div>
  <button class="btn btn-secondary optimizer-toggle" onclick="toggleOptimizer()"><i class="strategy-icon" data-lucide="bar-chart-2"></i> Optimizer</button>
  <aside class="optimizer-panel" id="optimizerPanel">

  <div class="mobile-tabs">
    <a href="/bracket" class="active">Bracket</a>
