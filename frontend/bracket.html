    async function fetchAnalysis(node, t1, t2) {
      const token = ++analysisToken;
      const el = document.getElementById('guided-analysis');
      if (!el) return;
      const prompt = '2-3 sentence analysis of ' + (t1.seed || '-') + ' ' + (t1.name || 'Team A') +
        ' vs ' + (t2.seed || '-') + ' ' + (t2.name || 'Team B') + ', ' +
        getRoundTitle(node.round).split(' (')[0] + ', ' + node.region + ' region. Who wins and why?';
      try {
        const r = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: [{ role: 'user', content: prompt }]
          })
        });
        if (!r.ok) throw new Error('analysis failed');
        const payload = await r.json();
        if (token !== analysisToken) return;
        el.classList.remove('loading');
        el.innerHTML = md(String(payload.reply || 'Model data unavailable.'));
      } catch (e) {
        if (token !== analysisToken) return;
        el.classList.remove('loading');
        el.style.color = 'var(--text-muted)';
        el.textContent = 'Model data unavailable.';
      }
    }

    async function openCard(nodeId, opts = {}) {
      if (flowLocked) return;
      const node = nodesById.get(nodeId);
      if (!node) return;
      const [t1, t2] = getMatchTeams(node);
      if (!t1 || !t2) return;
      if (opts.autoResume !== false) autoAdvanceEnabled = true;
      guidedNodeId = node.id;
      const overlay = document.getElementById('overlay');
      if (!overlay) return;
      overlay.classList.add('open');
      overlay.classList.remove('instant');
      const data = await getCardData(node);
      if (guidedNodeId !== node.id) return;
      renderCard(data, node);
    }

    function resumeAutoFlow(afterNodeId) {
      if (!autoAdvanceEnabled || flowLocked) return;
      const next = findNextFlowTarget(afterNodeId);
      if (!next) return;
      openCard(next.id, { autoResume: true, manualResume: false });
    }

    function updateStrategyBar() {
      for (const key of strategyKeys) {
        const ep = safeNum(strategyMap[key]?.total_ep, 0);
        const el = document.getElementById('ep-' + key);
        if (el) el.textContent = (ep ? ep.toFixed(0) : '--') + ' EP';
      }
    }

    function findStrategyNode(roundKey, entry, assigned) {
      const pick = normalizeName(entry?.pick);
      const opponent = normalizeName(entry?.opponent);
      if (!pick) return null;
      for (const node of nodesById.values()) {
        if (node.round !== roundKey) continue;
        if (assigned.has(node.id)) continue;
        if (roundKey === 'F4') {
          const childA = nodesById.get(node.children[0]);
          const childB = nodesById.get(node.children[1]);
          const regA = childA ? String(childA.region || '') : '';
          const regB = childB ? String(childB.region || '') : '';
          const pairing = normalizePairing(regA + ' vs ' + regB);
          const reverse = normalizePairing(regB + ' vs ' + regA);
          if (entry.pairing && pairing !== normalizePairing(entry.pairing) && reverse !== normalizePairing(entry.pairing)) continue;
        }
        if (roundKey === 'R64') {
          if (String(node.region || '') !== String(entry.region || '')) continue;
          const n1 = normalizeName(node.source?.t1?.name);
          const n2 = normalizeName(node.source?.t2?.name);
          if (![n1, n2].includes(pick)) continue;
          if (opponent && ![n1, n2].includes(opponent)) continue;
          return node;
        }
        if (roundKey === 'NCG') return node;
        if (String(node.region || '') !== String(entry.region || '')) continue;
        const [t1, t2] = getMatchTeams(node);
        const n1 = normalizeName(t1?.name);
        const n2 = normalizeName(t2?.name);
        if ([n1, n2].includes(pick)) return node;
      }
      return null;
    }

    async function applyStrategy(strategy) {
      const key = String(strategy || '').toLowerCase();
      if (!strategyKeys.includes(key)) return;
      let strategyData = strategyMap[key];
      try {
        const r = await fetch('/api/bracket-output/strategy/' + encodeURIComponent(key));
        if (r.ok) {
          strategyData = await r.json();
          strategyMap[key] = strategyData;
        }
      } catch (e) {}
      if (!strategyData) return;
      activeStrategy = key;
      strategyBaselinePicks = {};
      strategyEpByNode = {};
      customOverrideNodes.clear();
      bracketState.picks = {};
      const assigned = new Set();
      const order = [
        { json: 'R64', node: 'R64' },
        { json: 'R32', node: 'R32' },
        { json: 'S16', node: 'S16' },
        { json: 'E8', node: 'E8' },
        { json: 'F4', node: 'F4' },
        { json: 'Championship', node: 'NCG' },
      ];
      for (const step of order) {
        const picks = strategyData.rounds?.[step.json] || [];
        for (const pick of picks) {
          const node = findStrategyNode(step.node, pick, assigned);
          if (!node) continue;
          bracketState.picks[node.id] = pick.pick;
          strategyBaselinePicks[node.id] = pick.pick;
          strategyEpByNode[node.id] = safeNum(pick.ep, 0);
          assigned.add(node.id);
        }
      }
      bracketState.activeStrategy = key;
      saveState();
      renderAll();
    }

    function renderOptimizer() {
      const rankEl = document.getElementById('optimizerRankings');
      const champsEl = document.getElementById('optimizerChamps');
      if (!rankEl || !champsEl) return;
      const sortedEp = Object.entries(teamEpRankings || {}).sort((a, b) => Number(b[1]) - Number(a[1])).slice(0, 20);
      rankEl.innerHTML = sortedEp.map((row, i) =>
        '<div class="opt-row"><span>' + (i + 1) + '</span><span>' + row[0] + '</span><span>' + Number(row[1]).toFixed(1) + '</span></div>'
      ).join('') || '<div class="tiny">No EP data loaded.</div>';
      const champs = Object.entries(championProbs || {}).sort((a, b) => Number(b[1]) - Number(a[1])).slice(0, 10);
      champsEl.innerHTML = champs.map((row) =>
        '<div class="champ-bar" style="--w:' + (Number(row[1]) * 100).toFixed(1) + '"><span>' + row[0] + '</span><span>' + (Number(row[1]) * 100).toFixed(1) + '%</span></div>'
      ).join('') || '<div class="tiny">No champion probability data loaded.</div>';
    }

    function toggleOptimizer() {
      const panel = document.getElementById('optimizerPanel');
      if (!panel) return;
      panel.classList.toggle('open');
      if (panel.classList.contains('open')) renderOptimizer();
    }

    function optimizeBracket(strategy = 'balanced') {
      const picks = {};
      for (const round of roundOrder) {
        for (const node of nodesById.values()) {
          if (node.round !== round) continue;
          const [t1, t2] = getMatchTeams(node);
          if (!t1 || !t2) continue;
          const p1 = node.source
            ? normalizeProbability(node.source.t1?.win_probability, 0.5)
            : normalizeProbability(estimateWinProb(t1.name, t2.name), 0.5);
          picks[node.id] = p1 >= 0.5 ? t1.name : t2.name;
        }
      }
      return { strategy, picks };
    }

    async function autoFillOptimalBracket() {
      return autoFillModelPicks();
    }

    function resetBracket() {
      if (!confirm('Clear all bracket picks?')) return;
      bracketState.picks = {};
      activeStrategy = '';
      strategyBaselinePicks = {};
      strategyEpByNode = {};
      customOverrideNodes.clear();
      bracketState.activeStrategy = 'custom';
      saveState();
      renderAll();
    }

    async function autoFillModelPicks() {
      if (!confirm('Fill bracket with model-recommended picks? You can still change individual picks after.')) return;
      activeStrategy = '';
      bracketState.activeStrategy = 'custom';
      strategyBaselinePicks = {};
      strategyEpByNode = {};
      customOverrideNodes.clear();
      for (const round of roundOrder) {
        for (const node of nodesById.values()) {
          if (node.round !== round) continue;
          const [t1, t2] = getMatchTeams(node);
          if (!t1 || !t2) continue;
          if (node.source) {
            const p1 = normalizeProbability(node.source.t1?.win_probability, 0.5);
            bracketState.picks[node.id] = p1 >= 0.5 ? t1.name : t2.name;
            continue;
          }
          try {
            const data = await getMatchupForTeams(t1.name, t2.name);
            if (data) {
              const d1key = normalizeName(data?.t1?.name);
              const p1 = d1key === normalizeName(t1.name)
                ? normalizeProbability(data?.t1?.win_probability, 0.5)
                : normalizeProbability(data?.t2?.win_probability, 0.5);
              bracketState.picks[node.id] = p1 >= 0.5 ? t1.name : t2.name;
            } else {
              const est = Number(estimateWinProb(t1.name, t2.name));
              if (Number.isFinite(est)) {
                bracketState.picks[node.id] = est >= 0.5 ? t1.name : t2.name;
              } else {
                bracketState.picks[node.id] = Number(t1.seed || 99) <= Number(t2.seed || 99) ? t1.name : t2.name;
              }
            }
          } catch (e) {
            const est = Number(estimateWinProb(t1.name, t2.name));
            if (Number.isFinite(est)) {
              bracketState.picks[node.id] = est >= 0.5 ? t1.name : t2.name;
            } else {
              bracketState.picks[node.id] = Number(t1.seed || 99) <= Number(t2.seed || 99) ? t1.name : t2.name;
            }
          }
        }
      }
      saveState();
      renderAll();
    }

    async function autoFill() {
      return autoFillModelPicks();
    }

    async function exportBracket() {
      const lines = [];
      for (const node of nodesById.values()) {
        if (!validPickForNode(node)) continue;
        const pick = bracketState.picks[node.id];
        const [t1, t2] = getMatchTeams(node);
        const loser = t1?.name === pick ? t2?.name : t1?.name;
        lines.push(node.round + ': ' + pick + ' over ' + (loser || 'TBD'));
      }
      const text = 'BracketGPT 2025 Picks\n' + lines.join('\n');
      try { await navigator.clipboard.writeText(text); alert('Bracket copied to clipboard'); }
      catch (e) { alert(text); }
    }

    async function init() {
      showLoading();
      clearError();
      let bracketHint = '';
      try {
        await loadBracketData();
        const [rBracket, rOutput] = await Promise.all([
          fetch('/api/bracket'),
          fetch('/api/bracket-output').catch(() => null),
        ]);
        let data = null;
        if (rBracket && rBracket.ok) {
          const raw = await rBracket.json();
          data = normalizeBracketPayload(raw);
        } else if (rBracket) {
          const err = await rBracket.json().catch(() => ({}));
          bracketHint = String(err?.hint || err?.error || '').trim();
        }
        if (!Array.isArray(data?.matchups) || data.matchups.length === 0) {
          try {
            const bootstrapRes = await fetch('/api/bracket/bootstrap');
            if (bootstrapRes.ok) {
              const bootstrapData = await bootstrapRes.json();
              const normalizedBootstrap = normalizeBracketPayload(bootstrapData);
              if (Array.isArray(normalizedBootstrap?.matchups) && normalizedBootstrap.matchups.length) {
                data = normalizedBootstrap;
              }
            } else {
              const bootErr = await bootstrapRes.json().catch(() => ({}));
              if (!bracketHint) bracketHint = String(bootErr?.hint || bootErr?.error || '').trim();
            }
          } catch (e) {}
        }
        if (!Array.isArray(data?.matchups) || data.matchups.length === 0) {
          const fallbackData = await loadBracketFromUploadedJson();
          if (fallbackData) data = normalizeBracketPayload(fallbackData);
        }
        if (!data || !Array.isArray(data.matchups) || data.matchups.length === 0) {
          throw new Error(bracketHint || 'Could not load bracket data');
        }
        if (rOutput && rOutput.ok) {
          bracketOutput = await rOutput.json();
          strategyMap = bracketOutput.strategies || {};
          teamEpRankings = bracketOutput.team_ep_rankings || {};
          championProbs = bracketOutput.bracket_structure?.champion_probs || {};
          if (bracketOutput.metadata?.scoring) {
            roundPoints.R64 = safeNum(bracketOutput.metadata.scoring.R64, roundPoints.R64);
            roundPoints.R32 = safeNum(bracketOutput.metadata.scoring.R32, roundPoints.R32);
            roundPoints.S16 = safeNum(bracketOutput.metadata.scoring.S16, roundPoints.S16);
            roundPoints.E8 = safeNum(bracketOutput.metadata.scoring.E8, roundPoints.E8);
            roundPoints.F4 = safeNum(bracketOutput.metadata.scoring.F4, roundPoints.F4);
            roundPoints.NCG = safeNum(bracketOutput.metadata.scoring.Championship, roundPoints.NCG);
          }
        } else {
          strategyMap = {};
          teamEpRankings = {};
          championProbs = {};
        }
        window._teamDir = data.teamDirectory || data.team_directory || {};
        window._seedHistory = data.seedMatchupHistory || data.seed_matchup_all_rounds || {};
        window._archetypeMatrix = data.archetypeMatrix || data.archetype_matchup_matrix || {};
        window._espnScoring = data.espnScoring || data.espn_scoring || {};
        const regionFromMatchups = Array.isArray(data.matchups)
          ? Array.from(new Set(data.matchups.map((m) => String(m?.region || '').trim()).filter(Boolean)))
          : [];
        if (Array.isArray(data.regions) && data.regions.length) {
          regions = data.regions.map((r) => String(r || '').trim()).filter(Boolean);
        } else if (regionFromMatchups.length >= 2) {
          regions = regionFromMatchups;
        } else if (data.regions && !Array.isArray(data.regions) && typeof data.regions === 'object') {
          regions = Object.keys(data.regions).map((r) => String(r || '').trim()).filter(Boolean);
        } else {
          regions = ['South', 'East', 'West', 'Midwest'];
        }
        if (data?.final_four_pairings) {
          finalFourPairings = [
            [data.final_four_pairings?.semifinal_1?.region_a, data.final_four_pairings?.semifinal_1?.region_b],
            [data.final_four_pairings?.semifinal_2?.region_a, data.final_four_pairings?.semifinal_2?.region_b]
          ];
        } else if (Array.isArray(data.finalFourPairings) && data.finalFourPairings.length >= 2) {
          finalFourPairings = data.finalFourPairings;
        } else {
          finalFourPairings = defaultFinalFourPairings.slice();
        }
        window._f4Pairings = finalFourPairings;
        baseMatchups = Array.isArray(data.matchups) ? data.matchups : [];
        if (baseMatchups.length === 0) {
          document.getElementById('regions').innerHTML = '';
          document.getElementById('finals').innerHTML = '';
          showError(bracketHint || 'No bracket data loaded from API or uploaded bracket JSON. Verify backend/data/bracket_2025.json and backend/data/chatbot_predictions_v5.json are present.');
          return;
        }
        const byRegion = {};
        for (const m of baseMatchups) {
          const region = String(m?.region || '').trim();
          if (!region) continue;
          if (!byRegion[region]) byRegion[region] = [];
          byRegion[region].push(m);
        }
        for (const region of Object.keys(byRegion)) {
          byRegion[region] = orderRegionR64Matchups(byRegion[region]);
        }
        matchupById = new Map(baseMatchups.map((m) => [m.matchup_id, m]));
        buildTeamIndex();
        loadState();
        buildTree(byRegion, regions);
        updateStrategyBar();
        renderOptimizer();
        if (strategyKeys.includes(String(bracketState.activeStrategy || '').toLowerCase()) && strategyMap[String(bracketState.activeStrategy || '').toLowerCase()]) {
          await applyStrategy(String(bracketState.activeStrategy || '').toLowerCase());
        }
        saveState();
        renderAll();
        const teamQ = new URLSearchParams(window.location.search).get('team');
        let openedFromQuery = false;
        if (teamQ) {
          const target = normalizeName(teamQ);
          for (const node of nodesById.values()) {
            const [t1, t2] = getMatchTeams(node);
            if (normalizeName(t1?.name) === target || normalizeName(t2?.name) === target) {
              openCard(node.id);
              openedFromQuery = true;
              break;
            }
          }
        }
        if (!openedFromQuery) resumeAutoFlow();
      } catch (e) {
        showError(String(e?.message || '').trim() || "Couldn't load bracket data.");
      } finally {
        hideLoading();
      }
    }

    document.getElementById('roundTabs').addEventListener('click', (e) => {
      if (!e.target.classList.contains('round-tab')) return;
      mobileRound = e.target.dataset.round || 'R64';
      applyMobileRoundVisibility();
    });
    window.addEventListener('resize', applyMobileRoundVisibility);

    refreshIcons();
    init();
  </script>
</body>
</html>
