<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BracketGPT | Bracket</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface-2: #1c1c1c;
      --green: #3fb950;
      --orange: #ff6b00;
      --text: #e6edf3;
      --muted: #7d8590;
      --blue: #58a6ff;
      --yellow: #f2cc60;
      --red: #ff7b72;
      --border: rgba(255,255,255,0.11);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'DM Sans', sans-serif;
      background: radial-gradient(circle at 10% 0%, rgba(63,185,80,0.14), transparent 28%), var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,10,0.94);
      backdrop-filter: blur(8px);
    }
    .brand { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; letter-spacing: .04em; }
    .nav-links { display: flex; gap: 8px; }
    .nav-links a {
      border: 1px solid var(--border);
      padding: 7px 12px;
      border-radius: 9px;
      color: var(--muted);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .nav-links a.active { color: var(--text); border-color: var(--green); }

    .container { max-width: 1500px; margin: 0 auto; padding: 14px 14px 88px; }
    .topbar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .tophead { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
    .tophead h1 { margin: 0; font-family: 'Barlow Condensed', sans-serif; letter-spacing: .05em; font-size: 28px; }
    .actions { display: flex; gap: 8px; }
    .btn {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      border-radius: 8px;
      font-size: 12px;
      padding: 8px 10px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .btn:hover { border-color: var(--green); }
    .progress-wrap { margin-top: 10px; }
    .progress-label { display: flex; justify-content: space-between; color: var(--muted); font-size: 12px; }
    .progress {
      margin-top: 6px;
      height: 8px;
      background: #222;
      border-radius: 999px;
      overflow: hidden;
    }
    .progress > span {
      display: block;
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--green), #5be677);
      transition: width .2s ease;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(240px, 1fr));
      gap: 10px;
    }
    .region {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
    }
    .region h2 {
      margin: 0 0 8px;
      font-family: 'Barlow Condensed', sans-serif;
      letter-spacing: .08em;
      font-size: 20px;
      color: var(--green);
    }
    .round-col { margin-bottom: 10px; }
    .round-title {
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 6px;
    }
    .match {
      border: 1px solid var(--border);
      background: var(--surface-2);
      border-radius: 10px;
      padding: 6px;
      margin-bottom: 7px;
      transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease;
    }
    .match.picked { border-color: var(--green); box-shadow: 0 0 0 1px rgba(63,185,80,0.2); }
    .team-row { display: grid; grid-template-columns: auto 1fr auto auto; gap: 6px; align-items: center; margin-bottom: 4px; }
    .team-row:last-child { margin-bottom: 0; }
    .seed {
      font-size: 11px;
      color: var(--muted);
      min-width: 16px;
      text-align: center;
    }
    .team-btn {
      border: none;
      text-align: left;
      border-radius: 7px;
      padding: 6px 8px;
      background: rgba(255,255,255,0.03);
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
      transition: transform .12s ease, background .12s ease;
    }
    .team-btn:hover { transform: translateX(2px); }
    .team-btn.winner { background: rgba(63,185,80,0.2); }
    .team-btn:disabled { opacity: .5; cursor: default; }
    .prob { font-size: 10px; color: var(--muted); min-width: 42px; text-align: right; }
    .info {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      width: 22px;
      height: 22px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 12px;
    }
    .info:hover { color: var(--text); border-color: var(--blue); }

    .finals {
      margin-top: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
    }
    .finals h2 { margin: 0 0 8px; font-family: 'Barlow Condensed', sans-serif; font-size: 22px; letter-spacing: .08em; color: var(--orange); }
    .final-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

    .skeleton {
      height: 70px;
      border-radius: 10px;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #171717 0%, #232323 50%, #171717 100%);
      background-size: 240% 100%;
      animation: pulse 1s infinite linear;
    }
    @keyframes pulse { from { background-position: 0 0; } to { background-position: 220% 0; } }

    .error {
      border: 1px solid rgba(255,123,114,0.4);
      background: rgba(255,123,114,0.08);
      color: var(--text);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .round-tabs {
      display: none;
      overflow-x: auto;
      gap: 6px;
      padding: 8px 0;
      margin-bottom: 8px;
    }
    .strategy-bar {
      display: flex;
      gap: 8px;
      align-items: center;
      overflow-x: auto;
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #1a1a2e;
    }
    .strategy-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 12px;
      cursor: pointer;
      white-space: nowrap;
      font-size: 12px;
      letter-spacing: .04em;
    }
    .strategy-pill.active[data-strategy="chalk"] { border-color: #FFD700; box-shadow: 0 0 0 1px rgba(255,215,0,0.3); }
    .strategy-pill.active[data-strategy="balanced"] { border-color: #00CED1; box-shadow: 0 0 0 1px rgba(0,206,209,0.3); }
    .strategy-pill.active[data-strategy="upset"] { border-color: #FF4444; box-shadow: 0 0 0 1px rgba(255,68,68,0.3); }
    .strategy-pill .strategy-name { font-weight: 700; }
    .strategy-pill .strategy-ep { color: var(--muted); font-size: 11px; }
    .strategy-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }
    .custom-ep-counter { font-size: 12px; color: var(--muted); }
    .custom-ep-counter strong { color: var(--text); }
    .round-summary {
      margin-top: 6px;
      margin-bottom: 8px;
      padding-top: 6px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
    }
    .pick-meta {
      margin-top: 4px;
      padding: 4px 6px;
      border-radius: 6px;
      font-size: 10px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }
    .pick-meta.ep-good { background: rgba(63,185,80,0.15); color: #8cffb1; }
    .pick-meta.ep-mid { background: rgba(242,204,96,0.15); color: var(--yellow); }
    .pick-meta.ep-low { background: rgba(248,81,73,0.15); color: #ff9f98; }
    .match.strategy-overridden { border-style: dotted; border-color: var(--yellow); }
    .optimizer-toggle {
      position: fixed;
      right: 10px;
      top: 86px;
      z-index: 140;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      cursor: pointer;
    }
    .optimizer-panel {
      position: fixed;
      top: 126px;
      right: 0;
      width: min(360px, 95vw);
      max-height: calc(100vh - 140px);
      overflow: auto;
      z-index: 130;
      transform: translateX(100%);
      transition: transform .2s ease;
      border-left: 1px solid var(--border);
      background: rgba(12,12,18,0.98);
      padding: 12px;
    }
    .optimizer-panel.open { transform: translateX(0); }
    .opt-title { font-family: 'Barlow Condensed', sans-serif; letter-spacing: .08em; font-size: 18px; margin-bottom: 10px; }
    .opt-row { display: grid; grid-template-columns: 22px 1fr auto; gap: 8px; font-size: 12px; margin-bottom: 6px; align-items: center; }
    .opt-row .muted { color: var(--muted); font-size: 11px; margin-left: 4px; }
    .champ-bar { display: grid; grid-template-columns: 1fr auto; gap: 8px; font-size: 12px; margin-bottom: 6px; }
    .champ-bar span:first-child::after { content: ''; display: inline-block; width: calc(var(--w, 0) * 1%); max-width: 160px; height: 8px; margin-left: 8px; border-radius: 99px; background: linear-gradient(90deg, #2ea043, #58a6ff); }
    .round-tab {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 12px;
      white-space: nowrap;
      cursor: pointer;
    }
    .round-tab.active {
      color: var(--text);
      border-color: var(--green);
      background: rgba(63,185,80,0.1);
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.58);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 12px;
    }
    .overlay.open { display: flex; }
    .card {
      width: min(760px, 96vw);
      max-height: 92vh;
      overflow: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      animation: pop .16s ease;
    }
    @keyframes pop { from { opacity:0; transform: translateY(8px) scale(.98); } to { opacity:1; transform: translateY(0) scale(1); } }
    .card-head { display:flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 10px; }
    .badge { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; border-radius: 999px; padding: 4px 8px; border: 1px solid var(--border); }
    .badge.chalk { background: rgba(125,133,144,0.2); }
    .badge.upset_alert { background: rgba(255,107,0,0.2); border-color: rgba(255,107,0,0.45); }
    .badge.upset_watch { background: rgba(255,107,0,0.15); border-color: rgba(255,107,0,0.4); color: var(--orange); }
    .badge.competitive { background: rgba(242,204,96,0.15); border-color: rgba(242,204,96,0.4); color: var(--yellow); }
    .badge.leverage_play { background: rgba(88,166,255,0.2); border-color: rgba(88,166,255,0.45); }
    .badge.toss_up { background: rgba(242,204,96,0.2); border-color: rgba(242,204,96,0.45); }
    .badge.lock { background: rgba(63,185,80,0.2); border-color: rgba(63,185,80,0.45); color: var(--green); }
    .close {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      border-radius: 8px;
      width: 32px;
      height: 32px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .12s, color .12s;
    }
    .close:hover { background: rgba(255,255,255,0.08); color: var(--text); }

    .vs-row { display:grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center; margin-bottom: 10px; }
    .team-card { border: 1px solid var(--border); border-radius: 10px; padding: 12px; background: var(--surface-2); }
    .team-name { font-weight: 700; font-size: 15px; margin-bottom: 2px; }
    .archetype-icons { font-size: 14px; margin: 4px 0; min-height: 18px; }
    .prob-big { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; line-height: 1; }
    .tiny { font-size: 12px; color: var(--muted); }
    .bar { margin-top: 6px; height: 7px; background: #252525; border-radius: 999px; overflow: hidden; }
    .bar > span { display: block; height: 100%; }
    .bar.favorite > span { background: linear-gradient(90deg, var(--green), #78de89); }
    .bar.underdog > span { background: linear-gradient(90deg, var(--orange), #ff9a44); }
    .section { border-top: 1px solid var(--border); padding-top: 10px; margin-top: 10px; }
    .section h3 {
      margin: 0 0 8px;
      font-family: 'Barlow Condensed', sans-serif;
      letter-spacing: .07em;
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .data-row {
      display: flex;
      gap: 10px;
      align-items: baseline;
      margin-bottom: 4px;
      font-size: 13px;
    }
    .data-label {
      color: var(--muted);
      min-width: 80px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .data-value { color: var(--text); }
    .comp-line {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
      font-size: 13px;
    }
    .comp-team { font-weight: 600; min-width: 90px; }
    .comp-arrow { color: var(--muted); }
    .comp-detail { color: var(--text); }
    .comp-sim { color: var(--muted); font-size: 11px; margin-left: auto; }
    .player-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 3px;
      font-size: 13px;
    }
    .player-name { font-weight: 600; }
    .player-role { color: var(--muted); font-size: 11px; }
    .player-note { color: var(--muted); font-size: 12px; }
    .model-pick {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      margin: 10px 0;
      background: rgba(63,185,80,0.1);
      border: 1px solid rgba(63,185,80,0.3);
      border-radius: 10px;
    }
    .model-pick-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--green);
      background: rgba(63,185,80,0.15);
      padding: 3px 8px;
      border-radius: 4px;
    }
    .model-pick-team { font-weight: 700; font-size: 16px; }
    .model-pick-prob {
      color: var(--green);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px;
      font-weight: 700;
      margin-left: auto;
    }
    .model-pick-conf { font-size: 12px; color: var(--muted); }
    .pick-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
    .pick-btn { border: 1px solid var(--green); background: rgba(63,185,80,0.15); color: var(--text); border-radius: 9px; padding: 11px 10px; cursor: pointer; font-weight: 700; position: relative; }
    .pick-btn.recommended { border-color: var(--green); background: rgba(63,185,80,0.2); }
    .pick-btn.recommended::after {
      content: '* Model pick';
      position: absolute;
      top: -8px;
      right: 8px;
      font-size: 9px;
      color: var(--green);
      background: var(--surface);
      padding: 0 4px;
    }
    .pick-btn:not(.recommended) { border-color: var(--border); background: rgba(255,255,255,0.03); opacity: 0.8; }
    .ask-btn {
      display: block;
      text-align: center;
      padding: 10px;
      border: 1px solid rgba(88,166,255,0.4);
      background: rgba(88,166,255,0.08);
      color: var(--blue);
      border-radius: 9px;
      font-size: 13px;
      font-weight: 600;
      margin-top: 10px;
      transition: background .12s;
    }
    .ask-btn:hover { background: rgba(88,166,255,0.15); }

    .mobile-tabs {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(10,10,10,0.97);
      border-top: 1px solid var(--border);
      z-index: 120;
      grid-template-columns: repeat(3, 1fr);
    }
    .mobile-tabs a { text-align: center; padding: 10px 0; color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .06em; }
    .mobile-tabs a.active { color: var(--green); }

    @media (max-width: 1200px) { .grid { grid-template-columns: repeat(2, minmax(250px,1fr)); } .final-grid { grid-template-columns: 1fr; } }
    @media (max-width: 760px) {
      .nav-links { display: none; }
      .container { padding-bottom: 78px; }
      .grid { grid-template-columns: 1fr; }
      .round-tabs { display: flex; }
      .round-col { display: none; }
      .round-col.visible { display: block; }
      .mobile-tabs { display: grid; }
      .card { width: 100%; max-height: 95vh; border-radius: 12px 12px 0 0; align-self: end; animation: slide .18s ease; }
      @keyframes slide { from { transform: translateY(14px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
      .strategy-right { margin-left: 0; }
      .optimizer-toggle { top: auto; bottom: 88px; right: 10px; }
      .optimizer-panel {
        top: auto;
        bottom: 46px;
        width: 100%;
        max-height: 52vh;
        border-left: none;
        border-top: 1px solid var(--border);
        transform: translateY(102%);
      }
      .optimizer-panel.open { transform: translateY(0); }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="brand">BracketGPT</div>
    <div class="nav-links">
      <a href="/bracket" class="active">Bracket</a>
      <a href="/">Chat</a>
      <a href="/value-picks">Picks</a>
    </div>
  </nav>

  <main class="container">
    <section class="topbar">
      <div class="tophead">
        <h1>2025 Interactive Bracket</h1>
        <div class="actions">
          <button class="btn" onclick="resetBracket()">Clear All</button>
          <button class="btn" onclick="autoFill()" style="border-color: var(--green); color: var(--green);">Auto-Fill Model Picks</button>
          <button class="btn" onclick="exportBracket()">Export Bracket</button>
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-label"><span id="progress-text">0 / 63 picks</span><span id="completion-text">0%</span></div>
        <div class="progress"><span id="progress-bar"></span></div>
      </div>
    </section>
    <section class="strategy-bar" id="strategyBar">
      <button class="strategy-pill active" data-strategy="chalk" onclick="applyStrategy('chalk')">
        <span class="strategy-icon">&#127919;</span>
        <span class="strategy-name">CHALK</span>
        <span class="strategy-ep" id="ep-chalk">-- EP</span>
      </button>
      <button class="strategy-pill" data-strategy="balanced" onclick="applyStrategy('balanced')">
        <span class="strategy-icon">&#9878;</span>
        <span class="strategy-name">BALANCED</span>
        <span class="strategy-ep" id="ep-balanced">-- EP</span>
      </button>
      <button class="strategy-pill" data-strategy="upset" onclick="applyStrategy('upset')">
        <span class="strategy-icon">&#128293;</span>
        <span class="strategy-name">UPSET</span>
        <span class="strategy-ep" id="ep-upset">-- EP</span>
      </button>
      <div class="strategy-right">
        <div class="custom-ep-counter">Your Bracket: <strong id="custom-ep">0</strong> EP</div>
      </div>
    </section>
    <div class="round-tabs" id="roundTabs">
      <button class="round-tab active" data-round="R64">Rd 64</button>
      <button class="round-tab" data-round="R32">Rd 32</button>
      <button class="round-tab" data-round="S16">Sweet 16</button>
      <button class="round-tab" data-round="E8">Elite 8</button>
      <button class="round-tab" data-round="F4">Final 4</button>
    </div>

    <div id="error"></div>
    <div id="loading" style="display:none"></div>

    <section class="grid" id="regions"></section>

    <section class="finals" id="finals-section">
      <h2>Final Four + Championship</h2>
      <div class="final-grid" id="finals"></div>
    </section>
  </main>

  <div class="overlay" id="overlay" onclick="if(event.target.id==='overlay') closeCard()">
    <div class="card" id="card"></div>
  </div>
  <button class="optimizer-toggle" onclick="toggleOptimizer()">&#128202; Optimizer</button>
  <aside class="optimizer-panel" id="optimizerPanel">
    <div class="opt-title">&#128202; POINTS OPTIMIZER</div>
    <div id="optimizerRankings"></div>
    <div style="border-top:1px solid var(--border); margin:10px 0 8px; padding-top:8px; font-family:'Barlow Condensed',sans-serif; letter-spacing:.08em; font-size:15px">&#127942; Champion Probabilities</div>
    <div id="optimizerChamps"></div>
  </aside>

  <div class="mobile-tabs">
    <a href="/bracket" class="active">Bracket</a>
    <a href="/">Chat</a>
    <a href="/value-picks">Picks</a>
  </div>

  <script>
    const STORAGE_KEY = 'bracketgpt_state_v2';
    let regions = ['South', 'East', 'Midwest', 'West'];
    const roundOrder = ['R64', 'R32', 'S16', 'E8', 'F4', 'NCG'];
    const roundPoints = { R64: 10, R32: 20, S16: 40, E8: 80, F4: 160, NCG: 320 };
    const strategyRoundMap = { R64: 'R64', R32: 'R32', S16: 'S16', E8: 'E8', F4: 'F4', NCG: 'Championship' };
    const strategyKeys = ['chalk', 'balanced', 'upset'];
    const seedColors = {
      1: '#FFD700', 2: '#C0C0C0', 3: '#CD7F32', 4: '#58a6ff',
      5: '#3fb950', 6: '#f2cc60', 7: '#ff6b00', 8: '#ff7b72',
      9: '#bc8cff', 10: '#79c0ff', 11: '#56d364', 12: '#e3b341',
      13: '#7d8590', 14: '#8b949e', 15: '#484f58', 16: '#30363d'
    };

    let baseMatchups = [];
    let matchupById = new Map();
    let nodesById = new Map();
    let parentMap = new Map();
    let regionRoundIds = {};
    let finalIds = { F4: [], NCG: [] };
    let matchupCache = new Map();
    const teamIndex = new Map();
    let finalFourPairings = [['South', 'West'], ['East', 'Midwest']];
    let mobileRound = 'R64';
    let bracketOutput = null;
    let strategyMap = {};
    let teamEpRankings = {};
    let championProbs = {};
    let activeStrategy = '';
    let strategyBaselinePicks = {};
    let strategyEpByNode = {};
    let customOverrideNodes = new Set();

    const bracketState = {
      picks: {},
      completion: { R64: 0, R32: 0, S16: 0, E8: 0, F4: 0, NCG: 0, total: 0 },
      activeStrategy: ''
    };

    function normalizeName(v) {
      return String(v || '').toLowerCase().replace(/[^a-z0-9 ]/g, '').replace(/\s+/g, ' ').trim();
    }

    function showLoading() {
      const el = document.getElementById('loading');
      el.style.display = 'block';
      el.innerHTML = '<div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>';
    }

    function hideLoading() { document.getElementById('loading').style.display = 'none'; }

    function showError(msg) {
      document.getElementById('error').innerHTML = '<div class="error">' + msg + ' <button class="btn" onclick="init()">Retry</button></div>';
    }

    function clearError() { document.getElementById('error').innerHTML = ''; }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(bracketState));
      localStorage.setItem('bracketgpt_bracket_state', JSON.stringify(bracketState));
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (parsed && parsed.picks && typeof parsed.picks === 'object') bracketState.picks = parsed.picks;
        if (parsed && typeof parsed.activeStrategy === 'string') bracketState.activeStrategy = parsed.activeStrategy;
      } catch (e) {}
    }

    function normalizePairing(v) {
      return String(v || '').toLowerCase().replace(/\s+/g, ' ').trim();
    }

    function getRoundTitle(roundKey) {
      const names = { R64: 'Round of 64', R32: 'Round of 32', S16: 'Sweet 16', E8: 'Elite 8', F4: 'Final Four', NCG: 'Championship' };
      return (names[roundKey] || roundKey) + ' (' + (roundPoints[roundKey] || 0) + ' pts)';
    }

    function safeNum(v, fallback) {
      const n = Number(v);
      return Number.isFinite(n) ? n : (fallback || 0);
    }

    function roundEpClass(round, ep) {
      const max = roundPoints[round] || 10;
      if (ep >= max * 0.8) return 'ep-good';
      if (ep >= max * 0.4) return 'ep-mid';
      return 'ep-low';
    }

    function getConfidenceBadge(conf) {
      const c = String(conf || '').toLowerCase();
      const map = {
        lock: { label: '&#128274; LOCK', color: '#00FF88' },
        confident: { label: '&#9989; CONFIDENT', color: '#66CCFF' },
        lean: { label: '&#128202; LEAN', color: '#FFD700' },
        'toss-up': { label: '&#9878; TOSS-UP', color: '#FF8C00' },
        toss_up: { label: '&#9878; TOSS-UP', color: '#FF8C00' },
        underdog: { label: '&#128054; UNDERDOG', color: '#FF4444' },
      };
      if (map[c]) return map[c];
      if (c === 'strong') return map.confident;
      if (c === 'moderate') return map.lean;
      return { label: 'PROJECTED', color: 'var(--muted)' };
    }

    function upsetBadge(flag) {
      const key = String(flag || '').toLowerCase();
      const map = {
        chalk: { label: 'CHALK', color: '#888' },
        mostly_chalk: { label: 'MOSTLY CHALK', color: '#AAA' },
        closer_than_expected: { label: 'CLOSER THAN EXPECTED', color: '#FFD700' },
        vulnerable_favorite: { label: '&#9888; VULNERABLE FAVORITE', color: '#FF8C00' },
        slight_upset_pick: { label: '&#127919; SLIGHT UPSET PICK', color: '#FF6B6B' },
        strong_upset_pick: { label: '&#128293; STRONG UPSET PICK', color: '#FF4444' },
        toss_up: { label: '&#9878; TOSS-UP', color: '#FF8C00' },
      };
      return map[key] || map.chalk;
    }

    function riskBadge(tier) {
      const key = String(tier || '').toLowerCase();
      const map = {
        very_low: { label: 'Very Low Risk', color: '#00FF88' },
        low: { label: 'Low Risk', color: '#66CCFF' },
        medium: { label: 'Medium Risk', color: '#FFD700' },
        elevated: { label: 'Elevated Risk', color: '#FF8C00' },
        high: { label: 'High Risk', color: '#FF4444' },
      };
      return map[key] || { label: 'Risk N/A', color: 'var(--muted)' };
    }

    function estimateEpFromTeam(round, teamName) {
      const total = safeNum(teamEpRankings[teamName], 0);
      const maxRound = roundPoints.NCG || 320;
      return Math.min(roundPoints[round] || 0, total * ((roundPoints[round] || 0) / maxRound));
    }

    function getNodeEp(node, pickName) {
      const baseline = strategyEpByNode[node.id];
      if (baseline && strategyBaselinePicks[node.id] === pickName) return safeNum(baseline, 0);
      return estimateEpFromTeam(node.round, pickName);
    }

    function makeNode(id, round, region, source, children) {
      return { id, round, region, source: source || null, children: children || [] };
    }

    function matchupKey(nameA, nameB) {
      return normalizeName(nameA) + '|' + normalizeName(nameB);
    }

    function setCachedMatchup(nameA, nameB, data) {
      const key = matchupKey(nameA, nameB);
      const rev = matchupKey(nameB, nameA);
      matchupCache.set(key, data);
      matchupCache.set(rev, data);
    }

    function getCachedMatchup(nameA, nameB) {
      return matchupCache.get(matchupKey(nameA, nameB)) || null;
    }

    function buildTeamIndex() {
      const seedBaseline = {
        1: 28, 2: 23, 3: 20, 4: 17, 5: 15, 6: 13, 7: 11, 8: 9,
        9: 7, 10: 5, 11: 4, 12: 2, 13: -1, 14: -4, 15: -8, 16: -14
      };
      teamIndex.clear();
      for (const m of baseMatchups) {
        const t1 = m?.t1;
        const t2 = m?.t2;
        if (!t1?.name || !t2?.name) continue;
        teamIndex.set(t1.name, {
          ...t1,
          region: m.region,
          r64Opponent: t2.name,
          r64Margin: Number.isFinite(Number(t1.predicted_margin)) ? Number(t1.predicted_margin) : 0
        });
        teamIndex.set(t2.name, {
          ...t2,
          region: m.region,
          r64Opponent: t1.name,
          r64Margin: Number.isFinite(Number(t2.predicted_margin)) ? Number(t2.predicted_margin) : 0
        });
      }
      for (const team of teamIndex.values()) {
        const opp = teamIndex.get(team.r64Opponent);
        const oppSeed = Number(opp?.seed) || 16;
        const oppBase = Number(seedBaseline[oppSeed] ?? -14);
        const ownSeed = Number(team.seed) || 16;
        const ownBase = Number(seedBaseline[ownSeed] ?? 0);
        const marginPower = oppBase + Number(team.r64Margin || 0);
        team.power = Number.isFinite(marginPower) ? marginPower : ownBase;
      }
    }

    function estimateWinProb(teamAName, teamBName) {
      const a = teamIndex.get(teamAName);
      const b = teamIndex.get(teamBName);
      if (!a || !b) return 0.5;
      const diff = Number(a.power || 0) - Number(b.power || 0);
      return 1 / (1 + Math.pow(10, -diff / 11));
    }

    function linkParent(childId, parentId) {
      if (!parentMap.has(childId)) parentMap.set(childId, []);
      parentMap.get(childId).push(parentId);
    }

    function buildTree() {
      nodesById = new Map();
      parentMap = new Map();
      regionRoundIds = {};
      finalIds = { F4: [], NCG: [] };

      for (const region of regions) {
        const r64 = baseMatchups
          .filter((m) => m.region === region)
          .sort((a, b) => Number(a.game_number || 0) - Number(b.game_number || 0));
        const ids = { R64: [], R32: [], S16: [], E8: [] };
        for (const m of r64) {
          const id = m.matchup_id;
          nodesById.set(id, makeNode(id, 'R64', region, m, []));
          ids.R64.push(id);
        }
        for (let i = 0; i < 4; i++) {
          const c1 = ids.R64[i * 2];
          const c2 = ids.R64[i * 2 + 1];
          const id = `AUTO_R32_${region}_${i + 1}`;
          nodesById.set(id, makeNode(id, 'R32', region, null, [c1, c2]));
          ids.R32.push(id);
          linkParent(c1, id); linkParent(c2, id);
        }
        for (let i = 0; i < 2; i++) {
          const c1 = ids.R32[i * 2];
          const c2 = ids.R32[i * 2 + 1];
          const id = `AUTO_S16_${region}_${i + 1}`;
          nodesById.set(id, makeNode(id, 'S16', region, null, [c1, c2]));
          ids.S16.push(id);
          linkParent(c1, id); linkParent(c2, id);
        }
        const e8id = `AUTO_E8_${region}_1`;
        nodesById.set(e8id, makeNode(e8id, 'E8', region, null, [ids.S16[0], ids.S16[1]]));
        ids.E8.push(e8id);
        linkParent(ids.S16[0], e8id); linkParent(ids.S16[1], e8id);
        regionRoundIds[region] = ids;
      }

      const pairings = Array.isArray(finalFourPairings) && finalFourPairings.length >= 2
        ? finalFourPairings
        : [['South', 'West'], ['East', 'Midwest']];
      const p1 = pairings[0];
      const p2 = pairings[1];
      if (!p1 || !p2 || !regionRoundIds[p1[0]] || !regionRoundIds[p1[1]] || !regionRoundIds[p2[0]] || !regionRoundIds[p2[1]]) {
        finalFourPairings = [['South', 'West'], ['East', 'Midwest']];
      }
      const activePairs = finalFourPairings;
      const f4a = 'AUTO_F4_' + activePairs[0][0].charAt(0) + activePairs[0][1].charAt(0);
      const f4b = 'AUTO_F4_' + activePairs[1][0].charAt(0) + activePairs[1][1].charAt(0);
      const ncg = 'AUTO_NCG_1';
      const pair1a = regionRoundIds[activePairs[0][0]].E8[0];
      const pair1b = regionRoundIds[activePairs[0][1]].E8[0];
      const pair2a = regionRoundIds[activePairs[1][0]].E8[0];
      const pair2b = regionRoundIds[activePairs[1][1]].E8[0];
      nodesById.set(f4a, makeNode(f4a, 'F4', 'Final Four', null, [pair1a, pair1b]));
      nodesById.set(f4b, makeNode(f4b, 'F4', 'Final Four', null, [pair2a, pair2b]));
      nodesById.set(ncg, makeNode(ncg, 'NCG', 'Final Four', null, [f4a, f4b]));
      linkParent(pair1a, f4a); linkParent(pair1b, f4a);
      linkParent(pair2a, f4b); linkParent(pair2b, f4b);
      linkParent(f4a, ncg); linkParent(f4b, ncg);
      finalIds.F4 = [f4a, f4b];
      finalIds.NCG = [ncg];
    }

    function calcDownstreamExposure(round) {
      const start = roundOrder.indexOf(round);
      let total = 0;
      for (let i = start; i < roundOrder.length; i++) total += roundPoints[roundOrder[i]];
      return total;
    }

    function getMatchTeams(node) {
      if (!node) return [null, null];
      if (node.round === 'R64') return [node.source?.t1 || null, node.source?.t2 || null];
      const t1 = getWinnerTeam(node.children[0]);
      const t2 = getWinnerTeam(node.children[1]);
      return [t1 || null, t2 || null];
    }

    function getWinnerTeam(matchId) {
      const node = nodesById.get(matchId);
      if (!node) return null;
      const [t1, t2] = getMatchTeams(node);
      const pick = bracketState.picks[matchId];
      if (!pick) return null;
      if (t1 && t1.name === pick) return t1;
      if (t2 && t2.name === pick) return t2;
      return null;
    }

    function clearDescendantPicks(matchId) {
      const queue = [...(parentMap.get(matchId) || [])];
      const seen = new Set();
      while (queue.length) {
        const id = queue.shift();
        if (seen.has(id)) continue;
        seen.add(id);
        delete bracketState.picks[id];
        customOverrideNodes.delete(id);
        for (const p of (parentMap.get(id) || [])) queue.push(p);
      }
    }

    async function makePick(matchId, winnerName) {
      const node = nodesById.get(matchId);
      if (!node || !winnerName) return;
      bracketState.picks[matchId] = winnerName;
      if (activeStrategy && strategyBaselinePicks[matchId] && strategyBaselinePicks[matchId] !== winnerName) {
        customOverrideNodes.add(matchId);
        activeStrategy = '';
        bracketState.activeStrategy = 'custom';
      } else if (strategyBaselinePicks[matchId] && strategyBaselinePicks[matchId] === winnerName) {
        customOverrideNodes.delete(matchId);
      }
      clearDescendantPicks(matchId);
      saveState();
      renderAll();
      closeCard();
      for (const parentId of (parentMap.get(matchId) || [])) {
        const parentNode = nodesById.get(parentId);
        if (!parentNode) continue;
        const [pt1, pt2] = getMatchTeams(parentNode);
        if (!pt1 || !pt2) continue;
        if (getCachedMatchup(pt1.name, pt2.name)) continue;
        try {
          const r = await fetch('/api/matchup/by-teams/' + encodeURIComponent(pt1.name) + '/' + encodeURIComponent(pt2.name));
          if (!r.ok) continue;
          const data = await r.json();
          setCachedMatchup(pt1.name, pt2.name, data);
          renderAll();
        } catch (e) {}
      }
    }

    function validPickForNode(node) {
      const [t1, t2] = getMatchTeams(node);
      const pick = bracketState.picks[node.id];
      return !!pick && ((t1 && t1.name === pick) || (t2 && t2.name === pick));
    }

    function computeCompletion() {
      const counts = { R64: 0, R32: 0, S16: 0, E8: 0, F4: 0, NCG: 0, total: 0 };
      for (const node of nodesById.values()) {
        const [t1, t2] = getMatchTeams(node);
        if (!t1 || !t2) continue;
        if (validPickForNode(node)) {
          counts[node.round] += 1;
          counts.total += 1;
        }
      }
      bracketState.completion = counts;
      return counts;
    }

    function prerequisiteRound(node) {
      if (!node?.children?.length) return node?.round || 'R64';
      const childRound = nodesById.get(node.children[0])?.round || node.round;
      return childRound;
    }

    function teamRow(node, team, pick, prob) {
      if (!team) {
        const prereq = prerequisiteRound(node);
        return '<div class="team-row">' +
          '<span class="seed">-</span>' +
          '<button class="team-btn" disabled style="opacity:0.45;font-style:italic">Pick ' + prereq + ' to unlock</button>' +
          '<span class="prob">--</span>' +
          '<button class="info" disabled style="opacity:0.35">i</button>' +
        '</div>';
      }
      const disabled = '';
      const winner = team && pick === team.name ? 'winner' : '';
      const color = team?.color_primary || seedColors[team?.seed] || '#3a3a3a';
      return '<div class="team-row">' +
        '<span class="seed">' + (team?.seed ?? '-') + '</span>' +
        '<button class="team-btn ' + winner + '" style="border-left:3px solid ' + color + '" ' + disabled + ' onclick="makePick(\'' + node.id + '\',\'' + (team?.name || '').replace(/'/g, "\\'") + '\')">' + (team?.name || 'TBD') + '</button>' +
        '<span class="prob">' + (Number.isFinite(prob) ? (prob * 100).toFixed(1) + '%' : '--') + '</span>' +
        '<button class="info" onclick="openCard(\'' + node.id + '\')">i</button>' +
      '</div>';
    }

    function renderMatch(node) {
      const [t1, t2] = getMatchTeams(node);
      const pick = bracketState.picks[node.id] || '';
      let p1 = null;
      let p2 = null;
      if (node.round === 'R64' && node.source) {
        p1 = node.source.t1?.win_probability ?? null;
        p2 = node.source.t2?.win_probability ?? null;
      } else if (t1 && t2) {
        p1 = estimateWinProb(t1.name, t2.name);
        p2 = 1 - p1;
      }
      const pickedClass = validPickForNode(node) ? 'picked' : '';
      const overrideClass = customOverrideNodes.has(node.id) ? 'strategy-overridden' : '';
      let metaHtml = '';
      if (validPickForNode(node)) {
        const matchMeta = node.source?.matchup_meta || {};
        const ep = getNodeEp(node, pick);
        const conf = getConfidenceBadge(matchMeta.confidence);
        metaHtml = '<div class="pick-meta ' + roundEpClass(node.round, ep) + '">' +
          '<span>EP: ' + ep.toFixed(1) + '</span>' +
          '<span style="color:' + conf.color + '">' + conf.label + '</span>' +
        '</div>';
      }
      return '<div class="match ' + pickedClass + ' ' + overrideClass + '">' +
        teamRow(node, t1, pick, p1) +
        teamRow(node, t2, pick, p2) +
        metaHtml +
      '</div>';
    }

    function renderRegion(region) {
      const ids = regionRoundIds[region];
      if (!ids) return '';
      return '<section class="region">' +
        '<h2>' + region + '</h2>' +
        '<div class="round-col visible" data-round="R64"><div class="round-title">' + getRoundTitle('R64') + '</div>' + ids.R64.map((id) => renderMatch(nodesById.get(id))).join('') + roundSummary(ids.R64, 'R64') + '</div>' +
        '<div class="round-col" data-round="R32"><div class="round-title">' + getRoundTitle('R32') + '</div>' + ids.R32.map((id) => renderMatch(nodesById.get(id))).join('') + roundSummary(ids.R32, 'R32') + '</div>' +
        '<div class="round-col" data-round="S16"><div class="round-title">' + getRoundTitle('S16') + '</div>' + ids.S16.map((id) => renderMatch(nodesById.get(id))).join('') + roundSummary(ids.S16, 'S16') + '</div>' +
        '<div class="round-col" data-round="E8"><div class="round-title">' + getRoundTitle('E8') + '</div>' + ids.E8.map((id) => renderMatch(nodesById.get(id))).join('') + roundSummary(ids.E8, 'E8') + '</div>' +
      '</section>';
    }

    function renderFinals() {
      const f4html = finalIds.F4.map((id) => renderMatch(nodesById.get(id))).join('');
      const ncghtml = finalIds.NCG.map((id) => renderMatch(nodesById.get(id))).join('');
      document.getElementById('finals').innerHTML =
        '<div><div class="round-title">' + getRoundTitle('F4') + '</div>' + f4html + roundSummary(finalIds.F4, 'F4') + '</div>' +
        '<div><div class="round-title">' + getRoundTitle('NCG') + '</div>' + ncghtml + roundSummary(finalIds.NCG, 'NCG') + '</div>' +
        '<div><div class="round-title">Champion</div>' + championBlock() + '</div>';
    }

    function roundSummary(ids, round) {
      let ep = 0;
      let picks = 0;
      for (const id of (ids || [])) {
        const node = nodesById.get(id);
        const pick = bracketState.picks[id];
        if (!node || !pick || !validPickForNode(node)) continue;
        picks += 1;
        ep += getNodeEp(node, pick);
      }
      const max = ((ids || []).length * (roundPoints[round] || 0));
      return '<div class="round-summary">' + getRoundTitle(round) + '<br>Your picks: ' + ep.toFixed(1) + ' EP / ' + max.toFixed(0) + ' max</div>';
    }

    function championBlock() {
      const champId = finalIds.NCG[0];
      const winner = getWinnerTeam(champId);
      if (!winner) return '<div class="match"><div class="team-row"><span class="seed">-</span><button class="team-btn" disabled>TBD</button><span class="prob">--</span><button class="info" onclick="openCard(\'' + champId + '\')">i</button></div></div>';
      const color = winner.color_primary || seedColors[winner.seed] || '#3a3a3a';
      return '<div class="match picked"><div class="team-row"><span class="seed">' + (winner.seed ?? '-') + '</span><button class="team-btn winner" style="border-left:3px solid ' + color + '" onclick="openCard(\'' + champId + '\')">' + winner.name + ' Champion</button><span class="prob">100%</span><button class="info" onclick="openCard(\'' + champId + '\')">i</button></div></div>';
    }

    function renderProgress() {
      const c = computeCompletion();
      const pct = Math.round((c.total / 63) * 100);
      let totalEp = 0;
      for (const node of nodesById.values()) {
        const pick = bracketState.picks[node.id];
        if (!pick || !validPickForNode(node)) continue;
        totalEp += getNodeEp(node, pick);
      }
      document.getElementById('progress-text').textContent = c.total + ' / 63 picks';
      document.getElementById('completion-text').textContent = pct + '%';
      document.getElementById('progress-bar').style.width = pct + '%';
      const epEl = document.getElementById('custom-ep');
      if (epEl) epEl.textContent = totalEp.toFixed(0);
      const pills = document.querySelectorAll('.strategy-pill');
      pills.forEach((pill) => {
        const key = pill.dataset.strategy;
        pill.classList.toggle('active', !!activeStrategy && key === activeStrategy);
      });
      bracketState.activeStrategy = activeStrategy || 'custom';
      saveState();
    }

    function renderAll() {
      const regionsEl = document.getElementById('regions');
      regionsEl.innerHTML = regions.map((region) => renderRegion(region)).join('');
      renderFinals();
      renderProgress();
      applyMobileRoundVisibility();
    }

    function closeCard() {
      document.getElementById('overlay').classList.remove('open');
      document.getElementById('card').innerHTML = '';
    }

    function fallbackMeta(node) {
      const [t1, t2] = getMatchTeams(node);
      const roundLabel = {
        R32: 'Round of 32',
        S16: 'Sweet 16',
        E8: 'Elite 8',
        F4: 'Final Four',
        NCG: 'Championship'
      }[node.round] || node.round;
      return {
        matchup_id: node.id,
        round: node.round,
        region: node.region,
        t1: t1 || { name: 'TBD', seed: '-' },
        t2: t2 || { name: 'TBD', seed: '-' },
        matchup_meta: {
          display_flag: 'toss_up',
          confidence: 'projected',
          risk: { tier: 'medium', reason: roundLabel + ' matchup - model data available after both teams are picked' },
          chatbot_prompt: t1 && t2
            ? ('Compare ' + t1.name + ' vs ' + t2.name + ' in the ' + roundLabel)
            : 'How should this pick fit my bracket strategy?',
          seed_matchup: null,
          archetype_h2h: null,
          pool_meta: { leverage_delta: 0 }
        }
      };
    }

    function buildSyntheticMeta(t1, t2, prob, tA, tB, node) {
      const bestP = Math.max(prob, 1 - prob);
      const t1Favored = prob >= 0.5;
      const bestTeam = t1Favored ? t1 : t2;
      const bestData = t1Favored ? tA : tB;
      const otherData = t1Favored ? tB : tA;
      let confidence = 'toss_up';
      if (bestP >= 0.95) confidence = 'lock';
      else if (bestP >= 0.85) confidence = 'confident';
      else if (bestP >= 0.70) confidence = 'lean';
      else if (bestP >= 0.55) confidence = 'slight';
      let displayFlag = 'chalk';
      if (bestP < 0.60) displayFlag = 'toss_up';
      else if (bestP < 0.70) displayFlag = 'competitive';
      const roundLabel = { R32: 'Round of 32', S16: 'Sweet 16', E8: 'Elite 8', F4: 'Final Four', NCG: 'Championship' }[node.round] || node.round;
      let archetype_h2h = null;
      if (Array.isArray(tA?.archetypes) && Array.isArray(tB?.archetypes) && tA.archetypes[0] && tB.archetypes[0]) {
        archetype_h2h = {
          label: tA.archetypes[0] + ' vs ' + tB.archetypes[0],
          t1_archetype_win_pct: null,
          sample_size: null
        };
      }
      const bestSeed = Number(bestTeam?.seed ?? 99);
      const otherSeed = Number((t1Favored ? t2 : t1)?.seed ?? 99);
      return {
        confidence,
        display_flag: displayFlag,
        upset_flag: displayFlag,
        model_agrees_with_seed: bestSeed <= otherSeed,
        predicted_winner: bestTeam?.name || null,
        seed_matchup: null,
        archetype_h2h,
        pool_meta: {
          leverage_delta: null,
          contrarian_flag: false,
          points_this_round: roundPoints[node.round] || 1
        },
        risk: {
          tier: bestP >= 0.75 ? 'low' : bestP >= 0.60 ? 'medium' : 'high',
          reason: roundLabel + ' projected matchup' + (bestP >= 0.75 ? ' - strong favorite' : bestP >= 0.60 ? ' - moderate edge' : ' - toss-up territory')
        },
        chatbot_prompt: 'Compare ' + t1.name + ' vs ' + t2.name + ' in the ' + roundLabel,
        responses: {
          quick: (bestTeam?.name || 'Team') + ' is the model pick at ' + (bestP * 100).toFixed(0) + '%.'
        },
        winning_team_context: bestData?.archetypes?.[0] || null,
        underdog_context: otherData?.archetypes?.[0] || null
      };
    }

    async function getCardData(node) {
      if (node.round === 'R64' && node.source) return node.source;
      const [t1, t2] = getMatchTeams(node);
      if (!t1 || !t2) return fallbackMeta(node);
      const tA = teamIndex.get(t1.name) || {};
      const tB = teamIndex.get(t2.name) || {};
      const prob = estimateWinProb(t1.name, t2.name);
      const pickPct1 = Number(tA.pool?.public_pick_pct);
      const pickPct2 = Number(tB.pool?.public_pick_pct);
      const synthetic = {
        matchup_id: node.id,
        round: node.round,
        region: node.region,
        t1: {
          ...tA,
          ...t1,
          win_probability: prob,
          archetypes: tA.archetypes || t1.archetypes || [],
          archetype_icons: tA.archetype_icons || t1.archetype_icons || '',
          key_players: tA.key_players || t1.key_players || [],
          primary_comp: tA.primary_comp || t1.primary_comp || null,
          pool: tA.pool || t1.pool || {
            public_pick_pct: Number.isFinite(pickPct1) ? pickPct1 : null,
            public_pick_pct_source: 'projected'
          },
          color_primary: tA.color_primary || t1.color_primary || '#3a3a3a'
        },
        t2: {
          ...tB,
          ...t2,
          win_probability: 1 - prob,
          archetypes: tB.archetypes || t2.archetypes || [],
          archetype_icons: tB.archetype_icons || t2.archetype_icons || '',
          key_players: tB.key_players || t2.key_players || [],
          primary_comp: tB.primary_comp || t2.primary_comp || null,
          pool: tB.pool || t2.pool || {
            public_pick_pct: Number.isFinite(pickPct2) ? pickPct2 : null,
            public_pick_pct_source: 'projected'
          },
          color_primary: tB.color_primary || t2.color_primary || '#3a3a3a'
        },
        matchup_meta: buildSyntheticMeta(t1, t2, prob, tA, tB, node)
      };
      return synthetic;
    }

    function getConfidenceLabel(winProb) {
      const p = Math.max(Number(winProb || 0), 1 - Number(winProb || 0));
      if (p >= 0.95) return { label: 'Lock', color: 'var(--green)' };
      if (p >= 0.85) return { label: 'Confident', color: 'var(--green)' };
      if (p >= 0.70) return { label: 'Lean', color: 'var(--yellow)' };
      if (p >= 0.55) return { label: 'Slight edge', color: 'var(--yellow)' };
      return { label: 'Toss-up', color: 'var(--orange)' };
    }

    function getDisplayFlag(meta, t1p) {
      const upsetPct = Number(meta?.seed_matchup?.upset_pct || 0);
      const p = Math.max(Number(t1p || 0), 1 - Number(t1p || 0));
      if (p >= 0.95) return 'lock';
      if (upsetPct >= 0.35) return 'upset_watch';
      if (upsetPct >= 0.25) return 'competitive';
      if (meta?.pool_meta?.contrarian_flag) return 'leverage_play';
      if (p < 0.60) return 'toss_up';
      return 'chalk';
    }

    function leverageText(delta) {
      if (delta == null || !Number.isFinite(Number(delta))) return 'Not available';
      const d = Number(delta);
      const abs = Math.abs(d);
      if (abs < 0.03) return "Neutral - this pick won't differentiate your bracket";
      if (d > 0.08) return 'High leverage - contrarian upside if this team wins';
      if (d > 0.03) return 'Moderate leverage - some pool value';
      if (d < -0.08) return 'Negative leverage - everyone has this pick, no edge';
      return 'Slight negative leverage - popular pick with limited pool upside';
    }

    function exposureText(round, meta) {
      const pts = roundPoints[round] || 1;
      const nextRound = roundOrder[roundOrder.indexOf(round) + 1];
      const nextRoundPts = roundPoints[nextRound] || 0;
      return 'Worth ' + pts + ' pt' + (pts > 1 ? 's' : '') + ' this round' +
        (nextRoundPts ? ', ' + nextRoundPts + ' pts if they advance' : '');
    }

    function badgeClass(flag) {
      const f = String(flag || 'chalk').toLowerCase().replace(/\s+/g, '_');
      const valid = ['chalk', 'upset_alert', 'upset_watch', 'competitive', 'leverage_play', 'toss_up', 'lock'];
      return valid.includes(f) ? f : 'chalk';

        || (meta.seed_matchup?.higher_seed_wins != null && meta.seed_matchup?.lower_seed_wins != null

      document.getElementById('card').innerHTML =

    function updateStrategyBar() {
      for (const key of strategyKeys) {
        const ep = safeNum(strategyMap[key]?.total_ep, 0);
        const el = document.getElementById('ep-' + key);
        if (el) el.textContent = (ep ? ep.toFixed(0) : '--') + ' EP';
      }

    function findStrategyNode(roundKey, entry, assigned) {
      const pick = normalizeName(entry?.pick);
      const opponent = normalizeName(entry?.opponent);
      if (!pick) return null;
      for (const node of nodesById.values()) {
        if (node.round !== roundKey) continue;
        if (assigned.has(node.id)) continue;
        if (roundKey === 'F4') {
          const childA = nodesById.get(node.children[0]);
          const childB = nodesById.get(node.children[1]);
          const regA = childA ? String(childA.region || '') : '';
          const regB = childB ? String(childB.region || '') : '';
          const pairing = normalizePairing(regA + ' vs ' + regB);
          const reverse = normalizePairing(regB + ' vs ' + regA);
          if (entry.pairing && pairing !== normalizePairing(entry.pairing) && reverse !== normalizePairing(entry.pairing)) continue;
        }
        if (roundKey === 'R64') {
          if (String(node.region || '') !== String(entry.region || '')) continue;
          const n1 = normalizeName(node.source?.t1?.name);
          const n2 = normalizeName(node.source?.t2?.name);
          if (![n1, n2].includes(pick)) continue;
          if (opponent && ![n1, n2].includes(opponent)) continue;
          return node;
        }
        if (roundKey === 'NCG') return node;
        if (String(node.region || '') !== String(entry.region || '')) continue;
        const [t1, t2] = getMatchTeams(node);
        const n1 = normalizeName(t1?.name);
        const n2 = normalizeName(t2?.name);
        if ([n1, n2].includes(pick)) return node;
      }
      return null;
    }

    async function applyStrategy(strategy) {
      const key = String(strategy || '').toLowerCase();
      if (!strategyKeys.includes(key)) return;
      let strategyData = strategyMap[key];
      try {
        const r = await fetch('/api/bracket-output/strategy/' + encodeURIComponent(key));
        if (r.ok) {
          strategyData = await r.json();
          strategyMap[key] = strategyData;
        }
      } catch (e) {}
      if (!strategyData) return;
      activeStrategy = key;
      strategyBaselinePicks = {};
      strategyEpByNode = {};
      customOverrideNodes.clear();
      bracketState.picks = {};
      const assigned = new Set();
      const order = [
        { json: 'R64', node: 'R64' },
        { json: 'R32', node: 'R32' },
        { json: 'S16', node: 'S16' },
        { json: 'E8', node: 'E8' },
        { json: 'F4', node: 'F4' },
        { json: 'Championship', node: 'NCG' },
      ];
      for (const step of order) {
        const picks = strategyData.rounds?.[step.json] || [];
        for (const pick of picks) {
          const node = findStrategyNode(step.node, pick, assigned);
          if (!node) continue;
          bracketState.picks[node.id] = pick.pick;
          strategyBaselinePicks[node.id] = pick.pick;
          strategyEpByNode[node.id] = safeNum(pick.ep, 0);
          assigned.add(node.id);
        }
      }
      bracketState.activeStrategy = key;
      saveState();
      renderAll();
    }

    async function autoFill() {
      if (!confirm('Fill bracket with model-recommended picks? You can still change individual picks after.')) return;
      activeStrategy = '';
      bracketState.activeStrategy = 'custom';
      strategyBaselinePicks = {};
      strategyEpByNode = {};
      customOverrideNodes.clear();
      for (const round of roundOrder) {
        for (const node of nodesById.values()) {
          if (node.round !== round) continue;
          const [t1, t2] = getMatchTeams(node);
          if (!t1 || !t2) continue;
          if (node.source) {
            const p1 = Number(node.source.t1?.win_probability || 0.5);
            bracketState.picks[node.id] = p1 >= 0.5 ? t1.name : t2.name;
            continue;
          }
          try {
            const r = await fetch('/api/matchup/by-teams/' + encodeURIComponent(t1.name) + '/' + encodeURIComponent(t2.name));
            if (r.ok) {
              const data = await r.json();
              setCachedMatchup(t1.name, t2.name, data);
              const d1key = normalizeName(data?.t1?.name);
              const p1 = d1key === normalizeName(t1.name)
                ? Number(data?.t1?.win_probability || 0.5)
                : Number(data?.t2?.win_probability || 0.5);
              bracketState.picks[node.id] = p1 >= 0.5 ? t1.name : t2.name;
            } else {
              bracketState.picks[node.id] = Number(t1.seed || 99) <= Number(t2.seed || 99) ? t1.name : t2.name;
            }
          } catch (e) {
            bracketState.picks[node.id] = Number(t1.seed || 99) <= Number(t2.seed || 99) ? t1.name : t2.name;
          }
        }
      }
      saveState();
      renderAll();
    }

    async function exportBracket() {
      const lines = [];
      for (const node of nodesById.values()) {
        if (!validPickForNode(node)) continue;
        const pick = bracketState.picks[node.id];
        const [t1, t2] = getMatchTeams(node);
        const loser = t1?.name === pick ? t2?.name : t1?.name;
        lines.push(node.round + ': ' + pick + ' over ' + (loser || 'TBD'));
      }
      const text = 'BracketGPT 2025 Picks\n' + lines.join('\n');
      try { await navigator.clipboard.writeText(text); alert('Bracket copied to clipboard'); }
      catch (e) { alert(text); }
    }

    async function init() {
      showLoading();
      clearError();
      try {
        const [rBracket, rOutput] = await Promise.all([
          fetch('/api/bracket'),
          fetch('/api/bracket-output').catch(() => null),
        ]);
        if (!rBracket.ok) throw new Error('Could not load bracket data');
        const data = await rBracket.json();
        if (rOutput && rOutput.ok) {
          bracketOutput = await rOutput.json();
          strategyMap = bracketOutput.strategies || {};
          teamEpRankings = bracketOutput.team_ep_rankings || {};
          championProbs = bracketOutput.bracket_structure?.champion_probs || {};
          if (bracketOutput.metadata?.scoring) {
            roundPoints.R64 = safeNum(bracketOutput.metadata.scoring.R64, roundPoints.R64);
            roundPoints.R32 = safeNum(bracketOutput.metadata.scoring.R32, roundPoints.R32);
            roundPoints.S16 = safeNum(bracketOutput.metadata.scoring.S16, roundPoints.S16);
            roundPoints.E8 = safeNum(bracketOutput.metadata.scoring.E8, roundPoints.E8);
            roundPoints.F4 = safeNum(bracketOutput.metadata.scoring.F4, roundPoints.F4);
            roundPoints.NCG = safeNum(bracketOutput.metadata.scoring.Championship, roundPoints.NCG);
          }
        } else {
          strategyMap = {};
          teamEpRankings = {};
          championProbs = {};
        }
        if (Array.isArray(data.regions) && data.regions.length) {
          regions = data.regions.filter(Boolean);
        }
        finalFourPairings = Array.isArray(data.finalFourPairings) && data.finalFourPairings.length >= 2
          ? data.finalFourPairings
          : [['South', 'West'], ['East', 'Midwest']];
        baseMatchups = Array.isArray(data.matchups) ? data.matchups : [];
        if (baseMatchups.length === 0) {
          document.getElementById('regions').innerHTML = '';
          document.getElementById('finals').innerHTML = '';
          showError('No bracket data loaded. Upload matchup data via the Admin panel, or verify bracketgpt_matchups_2025_v2.json (or bracketgpt_matchups_2025_final.json) exists in backend/data/.');
          return;
        }
        matchupById = new Map(baseMatchups.map((m) => [m.matchup_id, m]));
        buildTeamIndex();
        loadState();
        buildTree();
        updateStrategyBar();
        renderOptimizer();
        if (strategyKeys.includes(String(bracketState.activeStrategy || '').toLowerCase()) && strategyMap[String(bracketState.activeStrategy || '').toLowerCase()]) {
          await applyStrategy(String(bracketState.activeStrategy || '').toLowerCase());
        }
        saveState();
        renderAll();
        const teamQ = new URLSearchParams(window.location.search).get('team');
        if (teamQ) {
          const target = normalizeName(teamQ);
          for (const node of nodesById.values()) {
            const [t1, t2] = getMatchTeams(node);
            if (normalizeName(t1?.name) === target || normalizeName(t2?.name) === target) {
              openCard(node.id);
              break;
            }
          }
        }
      } catch (e) {
        showError("Couldn't load bracket data.");
      } finally {
        hideLoading();
      }
    }

    document.getElementById('roundTabs').addEventListener('click', (e) => {
      if (!e.target.classList.contains('round-tab')) return;
      mobileRound = e.target.dataset.round || 'R64';
      applyMobileRoundVisibility();
    });
    window.addEventListener('resize', applyMobileRoundVisibility);

    init();
  </script>
</body>
</html>
